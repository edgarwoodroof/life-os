<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f1a;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-hover: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-hover: rgba(255, 255, 255, 0.15);
            --primary: #c9a8ff;
            --primary-glow: rgba(201, 168, 255, 0.4);
            --secondary: #8b7ec8;
            --text: #e8e8f0;
            --text-dim: #6a6a80;
            --rain: rgba(174, 194, 224, 0.25);
            --danger: #ff6b6b;
            --success: #6bcf6b;
            --accent-blue: #5ca8ff;
            --accent-pink: #ff6b9d;
            --font-main: 'Outfit', sans-serif;
        }

        .light-mode {
            --bg: #f0f2f5;
            --glass: rgba(0, 0, 0, 0.03);
            --glass-hover: rgba(0, 0, 0, 0.06);
            --glass-border: rgba(0, 0, 0, 0.08);
            --glass-border-hover: rgba(0, 0, 0, 0.15);
            --primary: #7c5cd6;
            --primary-glow: rgba(124, 92, 214, 0.3);
            --secondary: #9b8ac4;
            --text: #1a1a2e;
            --text-dim: #6a6a80;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; }

        body {
            font-family: var(--font-main);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.5s ease, color 0.3s ease;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(120, 80, 200, 0.12), transparent),
                        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(80, 60, 150, 0.08), transparent);
            pointer-events: none;
            z-index: -2;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 320px 1fr 300px;
            gap: 16px;
        }

        .col-left, .col-main, .col-right {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .panel {
            background: var(--glass);
            backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 14px;
            transition: all 0.3s ease;
        }

        .panel:hover {
            border-color: var(--glass-border-hover);
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--glass-border);
        }

        .panel-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
        }

        .panel-title::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 8px var(--primary-glow);
        }

        .panel-actions {
            display: flex;
            gap: 6px;
        }

        .panel-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            padding: 5px 8px;
            color: var(--text-dim);
            font-size: 11px;
            cursor: pointer;
        }

        .panel-btn:hover {
            background: var(--primary);
            color: var(--bg);
        }

        /* Clock */
        .clock-display {
            font-size: 56px;
            font-weight: 300;
            color: var(--text);
            line-height: 1;
            background: linear-gradient(135deg, var(--text) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .clock-seconds {
            font-size: 24px;
            color: var(--primary);
            opacity: 0.7;
        }

        .clock-date {
            font-size: 14px;
            color: var(--text-dim);
            margin-top: 12px;
        }

        .clock-greeting {
            font-size: 15px;
            color: var(--secondary);
            margin-top: 8px;
            padding: 10px 14px;
            background: var(--glass);
            border-radius: 10px;
        }

        .clock-formats {
            display: flex;
            gap: 6px;
            margin-top: 14px;
        }

        .clock-format-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            padding: 6px 10px;
            color: var(--text-dim);
            font-size: 10px;
            cursor: pointer;
        }

        .clock-format-btn:hover, .clock-format-btn.active {
            background: var(--primary);
            color: var(--bg);
        }

        /* Ambient */
        .ambient-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ambient-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--text);
            font-size: 12px;
            cursor: pointer;
        }

        .ambient-btn:hover {
            background: var(--glass-hover);
        }

        .ambient-btn.active {
            background: linear-gradient(135deg, rgba(201, 168, 255, 0.1) 0%, rgba(255, 107, 157, 0.1) 100%);
            border-color: var(--primary);
        }

        .ambient-icon { font-size: 16px; }
        .ambient-label { flex: 1; }

        .ambient-toggle {
            width: 36px;
            height: 20px;
            background: var(--glass);
            border-radius: 10px;
            position: relative;
        }

        .ambient-toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: var(--text-dim);
            border-radius: 50%;
        }

        .ambient-btn.active .ambient-toggle { background: var(--primary); }
        .ambient-btn.active .ambient-toggle::after { left: 18px; background: white; }

/* Calendar */
        .calendar-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .calendar-nav-btn {
            width: 28px;
            height: 28px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 12px;
        }

        .calendar-nav-btn:hover { background: var(--glass-hover); }

        .calendar-month {
            font-size: 14px;
            font-weight: 500;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .calendar-day-name {
            font-size: 9px;
            color: var(--text-dim);
            text-align: center;
            padding: 4px;
        }

        .calendar-day {
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            border-radius: 6px;
            cursor: pointer;
            background: var(--glass);
            transition: all 0.2s ease;
        }

        .calendar-day:hover { background: var(--glass-hover); }
        .calendar-day.other-month { opacity: 0.3; }
        .calendar-day.today { background: var(--primary); color: var(--bg); font-weight: 600; }
        .calendar-day.selected { background: var(--primary); color: var(--bg); }
        .calendar-day.has-event { box-shadow: inset 0 0 0 2px var(--primary); }

        /* Links */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 100px;
            overflow-y: auto;
        }

        .link-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            text-decoration: none;
            color: var(--text);
            font-size: 11px;
            transition: all 0.2s ease;
        }

        .link-item:hover {
            background: var(--glass-hover);
            border-color: var(--primary);
        }

        .link-icon { font-size: 14px; }

        .link-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .link-x {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 11px;
            opacity: 0;
        }

        .link-item:hover .link-x { opacity: 1; }
        .link-x:hover { color: var(--danger); }

        .link-input-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 10px;
        }

        .link-input {
            width: 100%;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            padding: 8px 10px;
            color: var(--text);
            font-size: 11px;
            outline: none;
        }

        .link-input:focus { border-color: var(--primary); }

        .link-add-btn {
            width: 100%;
            background: var(--primary);
            border: none;
            border-radius: 6px;
            color: var(--bg);
            font-size: 12px;
            padding: 8px;
            cursor: pointer;
        }

        /* Pomodoro */
        .pomodoro-display {
            text-align: center;
            margin: 8px 0;
        }

        .pomodoro-time {
            font-size: 52px;
            font-weight: 300;
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            line-height: 1;
        }

        .pomodoro-time.break { color: var(--accent-blue); }
        .pomodoro-time.focus { color: var(--primary); }

        .pomodoro-status {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        .pomodoro-controls {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 8px;
        }

        .pomodoro-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            padding: 6px 12px;
            color: var(--text);
            font-size: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .pomodoro-btn:hover { background: var(--glass-hover); }
        .pomodoro-btn.primary { background: var(--primary); color: var(--bg); }

        .pomodoro-settings {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 8px;
            padding-top: 6px;
            border-top: 1px solid var(--glass-border);
        }

        .pomodoro-setting label {
            font-size: 9px;
            color: var(--text-dim);
            display: block;
            margin-bottom: 2px;
        }

        .pomodoro-setting input {
            width: 40px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 4px;
            padding: 4px;
            color: var(--text);
            font-size: 11px;
            text-align: center;
        }

        /* Tasks */
        .task-input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }

        .task-input {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--text);
            font-size: 13px;
            outline: none;
        }

        .task-input:focus { border-color: var(--primary); }

        .task-cat {
            width: 90px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 12px;
            color: var(--text);
            font-size: 11px;
            outline: none;
        }

        .task-cat option { background: var(--bg); }

        .task-add-btn {
            width: 42px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent-pink) 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        .task-filters {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .task-filter-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 6px 12px;
            color: var(--text-dim);
            font-size: 11px;
            cursor: pointer;
        }

        .task-filter-btn:hover { color: var(--text); }
        .task-filter-btn.active { background: var(--primary); color: var(--bg); }

        .task-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 100px;
            max-height: 200px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
        }

        .task-item:hover { border-color: var(--glass-border-hover); }

        .task-check {
            width: 20px;
            height: 20px;
            border: 2px solid var(--glass-border-hover);
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .task-check.checked { background: var(--success); border-color: var(--success); }
        .task-check.checked::after { content: '✓'; color: white; font-size: 11px; }

        .task-text { flex: 1; font-size: 13px; }
        .task-item.done .task-text { text-decoration: line-through; color: var(--text-dim); }

        .task-tag {
            font-size: 9px;
            padding: 3px 8px;
            border-radius: 8px;
        }

        .task-del {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 14px;
            opacity: 0;
        }

        .task-item:hover .task-del { opacity: 1; }
        .task-del:hover { color: var(--danger); }

        .task-foot {
            display: flex;
            justify-content: space-between;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid var(--glass-border);
        }

        .task-count { font-size: 11px; color: var(--text-dim); }

        .task-clear {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            padding: 6px 10px;
            color: var(--text-dim);
            font-size: 10px;
            cursor: pointer;
        }

        .task-clear:hover { background: var(--danger); color: white; }

        /* Weather */
        .weather-main {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .weather-icon-wrap {
            width: 70px;
            height: 70px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .weather-icon { font-size: 38px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

        .weather-details { flex: 1; }

        .weather-temp { font-size: 36px; font-weight: 300; }
        .weather-temp-f { font-size: 13px; color: var(--text-dim); }
        .weather-con { font-size: 13px; color: var(--secondary); margin-top: 2px; }

        .weather-loc {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            padding: 10px 12px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            cursor: pointer;
        }

        .loc-text { flex: 1; font-size: 11px; color: var(--text-dim); }
        .loc-change { font-size: 10px; color: var(--primary); }

        .weather-btns {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .weather-btn {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 10px;
            color: var(--text-dim);
            font-size: 10px;
            cursor: pointer;
        }

        .weather-btn:hover { background: var(--glass-hover); }
        .weather-btn.active { background: var(--primary); color: var(--bg); }

        /* Notes */
        .notes-area {
            width: 100%;
            flex: 1;
            min-height: 150px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px;
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        .notes-area:focus { border-color: var(--primary); }

        .notes-status {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; }

        /* Rain */
        .rain-container { position: fixed; inset: 0; pointer-events: none; z-index: -1; }

        .raindrop {
            position: absolute;
            width: 2px;
            background: linear-gradient(to bottom, transparent, var(--rain));
            animation: rain linear infinite;
        }

        @keyframes rain {
            0% { transform: translateY(-100vh); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        /* Stars */
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Snow */
        .snowflake {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: snowfall linear infinite;
            opacity: 0.8;
        }

        @keyframes snowfall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        /* Fireflies */
        .firefly {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ffeb3b;
            border-radius: 50%;
            box-shadow: 0 0 8px #ffeb3b, 0 0 16px #ffeb3b;
            animation: fireflyMove 8s ease-in-out infinite;
        }

        @keyframes fireflyMove {
            0% { transform: translate(0, 0); opacity: 0; }
            20% { opacity: 1; }
            50% { transform: translate(100px, -50px); opacity: 1; }
            80% { transform: translate(-50px, -100px); opacity: 0.5; }
            100% { transform: translate(0, 0); opacity: 0; }
        }

        /* Modals */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal.active { opacity: 1; visibility: visible; }

        .modal-content {
            background: var(--bg);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 20px;
            width: 90%;
            max-width: 360px;
        }

        .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 14px; }
        .modal-input {
            width: 100%;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 12px;
            color: var(--text);
            font-size: 13px;
            outline: none;
            margin-bottom: 10px;
        }

        .modal-input:focus { border-color: var(--primary); }
        .modal-btns { display: flex; gap: 8px; }

        .modal-btn {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 10px;
            color: var(--text-dim);
            font-size: 12px;
            cursor: pointer;
        }

        .modal-btn:hover { background: var(--glass-hover); }
        .modal-btn.primary { background: var(--primary); color: var(--bg); }
        .modal-btn.danger { background: var(--danger); color: white; border-color: var(--danger); }

        /* Tags */
        .tags-list { max-height: 100px; overflow-y: auto; margin-bottom: 10px; }

        .events-list { max-height: 100px; overflow-y: auto; margin-bottom: 10px; }

        .event-item {
            padding: 8px 12px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            margin-bottom: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        .event-item:hover { background: var(--glass-hover); }
        .event-item.selected { border-color: var(--primary); background: var(--glass-hover); }

        .add-event-row { margin-bottom: 10px; }

        .tag-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            margin-bottom: 4px;
        }

        .tag-name {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }

        .tag-color { width: 10px; height: 10px; border-radius: 50%; }
        .tag-x { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 12px; }
        .tag-x:hover { color: var(--danger); }

        .add-tag-row { display: flex; gap: 6px; margin-bottom: 10px; }
        .add-tag-row input[type="color"] { width: 40px; height: 40px; border: none; border-radius: 8px; cursor: pointer; }
        .add-tag-row .modal-input { margin-bottom: 0; }

        /* Theme */
        .theme-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .theme-box { aspect-ratio: 1; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
        .theme-box:hover { transform: scale(1.1); }
        .theme-box.active { border-color: var(--text); }

        .settings-option { margin-bottom: 14px; }

    <script>
        // === GITHUB OAUTH CONFIG ===
        const GATEKEEPER_URL = 'https://gatekeeper-w0n8.onrender.com'; // Replace with your Gatekeeper URL
        const GITHUB_CLIENT_ID = 'Ov23lijsEqgzFnvRstrE'; // Replace with your client ID
        const GIST_FILENAME = 'life-os-data.json';

        const auth = {
            token: localStorage.getItem('gh_token') || null,
            user: JSON.parse(localStorage.getItem('gh_user') || 'null'),
            gistId: localStorage.getItem('gh_gist') || null
        };

        async function authenticate(code) {
            try {
                const resp = await fetch(GATEKEEPER_URL + '/' + code);
                const data = await resp.json();
                if (data.token) {
                    auth.token = data.token;
                    localStorage.setItem('gh_token', data.token);
                    await fetchUser();
                    await syncGist();
                }
            } catch (e) { console.error('Auth error:', e); }
        }

        async function fetchUser() {
            try {
                const resp = await fetch('https://api.github.com/user', { headers: { Authorization: 'token ' + auth.token } });
                auth.user = await resp.json();
                localStorage.setItem('gh_user', JSON.stringify(auth.user));
                updateAuthUI();
            } catch (e) { console.error(e); }
        }

        async function getOrCreateGist() {
            const resp = await fetch('https://api.github.com/gists', {
                headers: { Authorization: 'token ' + auth.token },
                method: 'POST',
                body: JSON.stringify({
                    description: 'Life OS Data',
                    public: false,
                    files: { [GIST_FILENAME]: { content: JSON.stringify(localData()) } }
                })
            });
            const gist = await resp.json();
            auth.gistId = gist.id;
            localStorage.setItem('gh_gist', gist.id);
            return gist;
        }

        async function syncGist() {
            if (!auth.token || !auth.user) return;
            if (!auth.gistId) {
                await getOrCreateGist();
            } else {
                await fetch('https://api.github.com/gists/' + auth.gistId, {
                    headers: { Authorization: 'token ' + auth.token },
                    method: 'PATCH',
                    body: JSON.stringify({
                        files: { [GIST_FILENAME]: { content: JSON.stringify(localData()) } }
                    })
                });
            }
        }

        async function loadFromGist() {
            if (!auth.token || !auth.gistId) return;
            try {
                const resp = await fetch('https://api.github.com/gists/' + auth.gistId);
                const gist = await resp.json();
                const content = gist.files[GIST_FILENAME]?.content;
                if (content) {
                    const d = JSON.parse(content);
                    if (d.todos) data.todos = d.todos;
                    if (d.notes !== undefined) data.notes = d.notes;
                    if (d.tags) data.tags = d.tags;
                    if (d.links) data.links = d.links;
                    if (d.events) data.events = d.events;
                    save();
                    refreshUI();
                }
            } catch (e) { console.error('Load error:', e); }
        }

        function localData() {
            return {
                todos: data.todos,
                notes: data.notes,
                tags: data.tags,
                links: data.links,
                filter: data.filter,
                clock: data.clock,
                light: data.light,
                rain: data.rain,
                sound: data.sound,
                stars: data.stars,
                snow: data.snow,
                fireflies: data.fireflies,
                theme: data.theme,
                selectedDate: data.selectedDate,
                events: data.events
            };
        }

        function logout() {
            auth.token = null;
            auth.user = null;
            auth.gistId = null;
            localStorage.removeItem('gh_token');
            localStorage.removeItem('gh_user');
            localStorage.removeItem('gh_gist');
            updateAuthUI();
        }

        function updateAuthUI() {
            const panel = document.getElementById('authPanel');
            const container = document.getElementById('authContainer');
            if (!auth.token) {
                panel.style.display = 'block';
                container.innerHTML = '<button class="auth-btn" id="loginBtn">Sign in with GitHub</button>';
            } else {
                panel.style.display = 'flex';
                container.innerHTML = '<img src="' + (auth.user?.avatar_url || '') + '" class="auth-avatar"><div class="auth-user">' + (auth.user?.login || '') + '</div><button class="auth-btn" id="logoutBtn">Sign out</button>';
            }
            document.getElementById('loginBtn')?.addEventListener('click', login);
            document.getElementById('logoutBtn')?.addEventListener('click', logout);
        }

        function login() {
            const redirect = encodeURIComponent('https://edgarwoodroof.github.io/life-os');
            window.location.href = 'https://github.com/login/oauth/authorize?client_id=' + GITHUB_CLIENT_ID + '&scope=gist&redirect_uri=' + redirect;
        }

        // Check for OAuth callback
        if (window.location.href.match(/\?code=(.*)/)) {
            const code = window.location.href.match(/\?code=(.*)/)[1];
            window.history.replaceState(null, '', window.location.pathname);
            authenticate(code);
        }

        // Data
        let data = {
            todos: JSON.parse(localStorage.getItem('todos')) || [],
            notes: localStorage.getItem('notes') || '',
            tags: JSON.parse(localStorage.getItem('tags')) || [
                { name: 'work', color: '#5ca8ff' },
                { name: 'personal', color: '#ff6b9d' },
                { name: 'urgent', color: '#ff6b6b' }
            ],
            links: JSON.parse(localStorage.getItem('links')) || [],
            filter: 'all',
            clock: localStorage.getItem('clock') || '12',
            light: localStorage.getItem('lightMode') === 'true',
            rain: localStorage.getItem('rain') === 'true',
            sound: localStorage.getItem('sound') === 'true',
            stars: localStorage.getItem('stars') === 'true',
            snow: localStorage.getItem('snow') === 'true',
            fireflies: localStorage.getItem('fireflies') === 'true',
            theme: localStorage.getItem('theme') || 'rainy',
            selectedDate: new Date().toISOString().split('T')[0],
            events: JSON.parse(localStorage.getItem('events')) || []
        };

        let currentMonth = new Date();
        let weather = { temp: 15, con: 'rainy', lat: 35.0116, lon: 135.7681, name: 'Kyoto, JP' };
        
        let pomodoro = {
            time: 25 * 60,
            isRunning: false,
            isBreak: false,
            interval: null,
            focusTime: 25,
            breakTime: 5
        };

        const themes = [
            { name: 'rainy', bg: '#0f0f1a', primary: '#c9a8ff', secondary: '#8b7ec8' },
            { name: 'sunny', bg: '#1a1610', primary: '#ffb347', secondary: '#ff8c00' },
            { name: 'cloudy', bg: '#1a1a24', primary: '#9a9aac', secondary: '#707080' },
            { name: 'night', bg: '#08080f', primary: '#a78bfa', secondary: '#c4b5fd' },
            { name: 'ocean', bg: '#0a1628', primary: '#38bdf8', secondary: '#7dd3fc' },
            { name: 'forest', bg: '#0a1a0f', primary: '#4ade80', secondary: '#86efac' },
            { name: 'rose', bg: '#1a0a14', primary: '#fb7185', secondary: '#fda4af' },
            { name: 'midnight', bg: '#0a0a1a', primary: '#6366f1', secondary: '#818cf8' },
            { name: 'purple', bg: '#120a1a', primary: '#e879f9', secondary: '#f0abfc' },
            { name: 'gold', bg: '#1a1408', primary: '#fbbf24', secondary: '#fcd34d' },
            { name: 'coral', bg: '#1a0f0c', primary: '#fb923c', secondary: '#fdba74' },
            { name: 'mint', bg: '#0a1510', primary: '#34d399', secondary: '#6ee7b7' },
            { name: 'lavender', bg: '#14101a', primary: '#a78bfa', secondary: '#c4b5fd' },
            { name: 'peach', bg: '#1a120e', primary: '#fdba74', secondary: '#fed7aa' },
            { name: 'slate', bg: '#0f1115', primary: '#94a3b8', secondary: '#cbd5e1' },
            { name: 'emerald', bg: '#071a14', primary: '#10b981', secondary: '#34d399' }
        ];

        function save() {
            localStorage.setItem('todos', JSON.stringify(data.todos));
            localStorage.setItem('notes', data.notes);
            localStorage.setItem('tags', JSON.stringify(data.tags));
            localStorage.setItem('links', JSON.stringify(data.links));
            localStorage.setItem('filter', data.filter);
            localStorage.setItem('clock', data.clock);
            localStorage.setItem('lightMode', data.light);
            localStorage.setItem('rain', data.rain);
            localStorage.setItem('sound', data.sound);
            localStorage.setItem('stars', data.stars);
            localStorage.setItem('snow', data.snow);
            localStorage.setItem('fireflies', data.fireflies);
            localStorage.setItem('theme', data.theme);
            localStorage.setItem('selectedDate', data.selectedDate);
            localStorage.setItem('events', JSON.stringify(data.events));
            if (auth.token) syncGist();
        }

        window.addEventListener('storage', (e) => {
            if (e.key === 'todos') data.todos = JSON.parse(e.newValue);
            else if (e.key === 'notes') data.notes = e.newValue;
            else if (e.key === 'tags') data.tags = JSON.parse(e.newValue);
            else if (e.key === 'links') data.links = JSON.parse(e.newValue);
            else if (e.key === 'lightMode') data.light = e.newValue === 'true';
            else if (e.key === 'theme') data.theme = e.newValue;
            refreshUI();
        });

        function refreshUI() {
            renderTodos();
            renderFilters();
            renderCalendar();
            renderLinks();
            applyTheme(data.theme);
            applyLight();
            renderTags();
            updateCat();
        }

        // Clock
        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            if (data.clock === '12') h = h % 12 || 12;
            document.getElementById('clockH').textContent = String(h).padStart(2, '0');
            document.getElementById('clockM').textContent = m;
            document.getElementById('clockS').textContent = ':' + s;
            document.getElementById('clockDate').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            let g = 'Night';
            if (now.getHours() >= 5 && now.getHours() < 12) g = 'Morning';
            else if (now.getHours() >= 12 && now.getHours() < 17) g = 'Afternoon';
            else if (now.getHours() >= 17 && now.getHours() < 21) g = 'Evening';
            document.getElementById('greeting').textContent = 'Good ' + g;
        }

        document.querySelectorAll('.clock-format-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.clock-format-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                data.clock = btn.dataset.f;
                save();
                updateClock();
            });
        });

        setInterval(updateClock, 1000);
        updateClock();
        document.querySelector(`.clock-format-btn[data-f="${data.clock}"]`)?.classList.add('active');

        // Weather
        async function fetchWeather() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${weather.lat}&longitude=${weather.lon}&current_weather=true`);
                const d = await res.json();
                weather.temp = d.current_weather.temperature;
                const code = d.current_weather.weathercode;
                weather.con = code <= 3 ? 'clear' : code <= 48 ? 'cloudy' : 'rainy';
                document.getElementById('tempC').textContent = Math.round(weather.temp);
                document.getElementById('tempF').textContent = Math.round(weather.temp * 9/5 + 32) + '°F';
                document.getElementById('weatherCon').textContent = weather.con.charAt(0).toUpperCase() + weather.con.slice(1);
                document.getElementById('weatherIcon').textContent = weather.con === 'rainy' ? '🌧️' : weather.con === 'cloudy' ? '☁️' : '☀️';
                if (!localStorage.getItem('manualTheme')) applyTheme(weather.con === 'rainy' ? 'rainy' : weather.con === 'cloudy' ? 'cloudy' : 'sunny');
            } catch (e) { console.log(e); }
        }

        function getLoc() {
            navigator.geolocation.getCurrentPosition(async (p) => {
                weather.lat = p.coords.latitude;
                weather.lon = p.coords.longitude;
                weather.name = 'Current';
                document.getElementById('locText').textContent = 'Current Location';
                fetchWeather();
            }, () => {
                document.getElementById('locText').textContent = weather.name;
                fetchWeather();
            });
        }

        document.getElementById('autoLocBtn').addEventListener('click', getLoc);
        document.getElementById('locBtn').addEventListener('click', () => {
            document.getElementById('locInput').value = '';
            document.getElementById('locModal').classList.add('active');
        });
        document.getElementById('locCancel').addEventListener('click', () => document.getElementById('locModal').classList.remove('active'));
        document.getElementById('locSave').addEventListener('click', async () => {
            const city = document.getElementById('locInput').value;
            if (city) {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}`);
                const d = await res.json();
                if (d.length) {
                    weather.lat = parseFloat(d[0].lat);
                    weather.lon = parseFloat(d[0].lon);
                    weather.name = d[0].display_name.split(',')[0];
                }
            }
            document.getElementById('locModal').classList.remove('active');
            document.getElementById('locText').textContent = weather.name;
            fetchWeather();
        });
        getLoc();

        // Calendar
        function renderCalendar() {
            document.getElementById('calendarMonth').textContent = currentMonth.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            const grid = document.getElementById('calendarGrid');
            const days = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
            let html = days.map(d => `<div class="calendar-day-name">${d}</div>`).join('');
            const firstDay = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1).getDay();
            const daysInMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0).getDate();
            const daysInPrevMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 0).getDate();
            const today = new Date().toISOString().split('T')[0];
            for (let i = firstDay - 1; i >= 0; i--) html += `<div class="calendar-day other-month">${daysInPrevMonth - i}</div>`;
            for (let i = 1; i <= daysInMonth; i++) {
                const date = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), i).toISOString().split('T')[0];
                const isToday = date === today;
                const isSelected = date === data.selectedDate;
                const hasEvent = data.events.some(e => e.date === date);
                html += `<div class="calendar-day${isToday ? ' today' : ''}${isSelected ? ' selected' : ''}${hasEvent ? ' has-event' : ''}" data-date="${date}">${i}</div>`;
            }
            const remaining = 42 - (firstDay + daysInMonth);
            for (let i = 1; i <= remaining; i++) html += `<div class="calendar-day other-month">${i}</div>`;
            grid.innerHTML = html;
            grid.querySelectorAll('.calendar-day[data-date]').forEach(d => {
                d.addEventListener('click', () => {
                    data.selectedDate = d.dataset.date;
                    save();
                    renderCalendar();
                    openEventModal(d.dataset.date);
                });
            });
        }

        let selectedEventIndex = null;

        function openEventModal(date) {
            const parts = date.split('-');
            const adjusted = new Date(parts[0], parts[1] - 1, parts[2]);
            adjusted.setDate(adjusted.getDate() + 1);
            document.getElementById('eventDate').textContent = adjusted.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            renderEventsList(date);
            document.getElementById('eventModal').classList.add('active');
            document.getElementById('eventTitle').value = '';
            selectedEventIndex = null;
        }

        function renderEventsList(date) {
            const list = document.getElementById('eventsList');
            const events = data.events.filter(e => e.date === date);
            if (events.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-text">No events</div></div>';
            } else {
                list.innerHTML = events.map((e, i) => `<div class="event-item" data-i="${i}">${e.title}</div>`).join('');
                list.querySelectorAll('.event-item').forEach(item => {
                    item.addEventListener('click', () => {
                        list.querySelectorAll('.event-item').forEach(el => el.classList.remove('selected'));
                        item.classList.add('selected');
                        selectedEventIndex = parseInt(item.dataset.i);
                        const filtered = data.events.filter(e => e.date === date);
                        document.getElementById('eventTitle').value = filtered[selectedEventIndex]?.title || '';
                    });
                });
            }
        }

        document.getElementById('addEventBtn').addEventListener('click', () => {
            const title = document.getElementById('eventTitle').value.trim();
            if (!title) return;
            data.events.push({ date: data.selectedDate, title: title });
            save();
            renderCalendar();
            renderEventsList(data.selectedDate);
            document.getElementById('eventTitle').value = '';
        });

        document.getElementById('deleteEventBtn').addEventListener('click', () => {
            if (selectedEventIndex === null) return;
            const date = data.selectedDate;
            const filtered = data.events.filter(e => e.date === date);
            const eventToDelete = filtered[selectedEventIndex];
            if (eventToDelete) {
                data.events = data.events.filter(e => !(e.date === date && e.title === eventToDelete.title));
                save();
                renderCalendar();
                renderEventsList(date);
                selectedEventIndex = null;
                document.getElementById('eventTitle').value = '';
            }
        });

        document.getElementById('eventDone').addEventListener('click', () => document.getElementById('eventModal').classList.remove('active'));

        document.getElementById('prevMonth').addEventListener('click', () => { currentMonth.setMonth(currentMonth.getMonth() - 1); renderCalendar(); });
        document.getElementById('nextMonth').addEventListener('click', () => { currentMonth.setMonth(currentMonth.getMonth() + 1); renderCalendar(); });
        renderCalendar();

        // Pomodoro
        function updatePomodoroDisplay() {
            const mins = Math.floor(pomodoro.time / 60);
            const secs = pomodoro.time % 60;
            document.getElementById('pomodoroTime').textContent = String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
            document.getElementById('pomodoroTime').className = 'pomodoro-time ' + (pomodoro.isBreak ? 'break' : 'focus');
            document.getElementById('pomodoroStatus').textContent = pomodoro.isRunning ? (pomodoro.isBreak ? 'Break time!' : 'Focusing...') : (pomodoro.isBreak ? 'Break over' : 'Ready to focus');
        }

        function togglePomodoro() {
            if (pomodoro.isRunning) {
                clearInterval(pomodoro.interval);
                pomodoro.isRunning = false;
            } else {
                pomodoro.isRunning = true;
                pomodoro.interval = setInterval(() => {
                    if (pomodoro.time > 0) {
                        pomodoro.time--;
                        updatePomodoroDisplay();
                    } else {
                        clearInterval(pomodoro.interval);
                        pomodoro.isRunning = false;
                        pomodoro.isBreak = !pomodoro.isBreak;
                        pomodoro.time = (pomodoro.isBreak ? pomodoro.breakTime : pomodoro.focusTime) * 60;
                        if (pomodoro.isBreak) pomodoro.breakTime = parseInt(document.getElementById('breakTime').value);
                        else pomodoro.focusTime = parseInt(document.getElementById('focusTime').value);
                        updatePomodoroDisplay();
                    }
                }, 1000);
            }
            updatePomodoroDisplay();
        }

        document.getElementById('pomodoroStart').addEventListener('click', togglePomodoro);
        document.getElementById('pomodoroPause').addEventListener('click', () => {
            clearInterval(pomodoro.interval);
            pomodoro.isRunning = false;
            updatePomodoroDisplay();
        });
        document.getElementById('pomodoroReset').addEventListener('click', () => {
            clearInterval(pomodoro.interval);
            pomodoro.isRunning = false;
            pomodoro.isBreak = false;
            pomodoro.focusTime = parseInt(document.getElementById('focusTime').value);
            pomodoro.time = pomodoro.focusTime * 60;
            updatePomodoroDisplay();
        });
        updatePomodoroDisplay();

        // Links
        function renderLinks() {
            const list = document.getElementById('linksList');
            if (!data.links.length) {
                list.innerHTML = '<div class="empty-state"><div class="empty-text">No links yet</div></div>';
            } else {
                list.innerHTML = data.links.map((l, i) => `
                    <a href="${l.url}" target="_blank" class="link-item">
                        <span class="link-icon">🔗</span>
                        <span class="link-name">${l.name}</span>
                        <button class="link-x" data-i="${i}">×</button>
                    </a>
                `).join('');
                list.querySelectorAll('.link-x').forEach(b => {
                    b.addEventListener('click', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        data.links.splice(b.dataset.i, 1);
                        save();
                        renderLinks();
                    });
                });
            }
        }

        document.getElementById('linkAdd').addEventListener('click', () => {
            const name = document.getElementById('linkName').value.trim();
            const url = document.getElementById('linkUrl').value.trim();
            if (!name || !url) return;
            data.links.push({ name, url });
            save();
            document.getElementById('linkName').value = '';
            document.getElementById('linkUrl').value = '';
            renderLinks();
        });
        renderLinks();

        // Tasks
        function updateCat() {
            document.getElementById('taskCat').innerHTML = '<option value="">Tag</option>' + data.tags.map(t => `<option value="${t.name}">${t.name}</option>`).join('');
        }

        function renderFilters() {
            document.getElementById('taskFilters').innerHTML = '<button class="task-filter-btn active" data-filter="all">All</button>' + data.tags.map(t => `<button class="task-filter-btn" data-filter="${t.name}">${t.name}</button>`).join('');
            document.querySelectorAll('.task-filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.task-filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    data.filter = btn.dataset.filter;
                    save();
                    renderTodos();
                });
            });
            document.querySelector(`.task-filter-btn[data-filter="${data.filter}"]`)?.classList.add('active');
        }

        function getTagColor(name) {
            return data.tags.find(t => t.name === name)?.color || '#888';
        }

        function renderTodos() {
            let tasks = data.todos;
            if (data.filter !== 'all') tasks = tasks.filter(t => t.cat === data.filter);
            const list = document.getElementById('taskList');
            if (!tasks.length) {
                list.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-text">No tasks</div></div>';
            } else {
                list.innerHTML = tasks.map((t, i) => `
                    <div class="task-item ${t.done ? 'done' : ''}">
                        <div class="task-check ${t.done ? 'checked' : ''}" data-i="${i}"></div>
                        <div class="task-text">${t.text}</div>
                        ${t.cat ? `<span class="task-tag" style="background:${getTagColor(t.cat)}20;color:${getTagColor(t.cat)}">${t.cat}</span>` : ''}
                        <button class="task-del" data-i="${i}">×</button>
                    </div>
                `).join('');
                list.querySelectorAll('.task-check').forEach(b => {
                    b.addEventListener('click', () => {
                        const text = b.closest('.task-item').querySelector('.task-text').textContent;
                        data.todos.find(t => t.text === text).done = !data.todos.find(t => t.text === text).done;
                        save();
                        renderTodos();
                    });
                });
                list.querySelectorAll('.task-del').forEach(b => {
                    b.addEventListener('click', () => { data.todos.splice(b.dataset.i, 1); save(); renderTodos(); });
                });
            }
            const left = data.todos.filter(t => !t.done).length;
            document.getElementById('taskCount').textContent = `${left} of ${data.todos.length} left`;
        }

        document.getElementById('taskAddBtn').addEventListener('click', () => {
            const text = document.getElementById('taskInput').value.trim();
            const cat = document.getElementById('taskCat').value;
            if (!text) return;
            data.todos.push({ text, done: false, cat });
            save();
            document.getElementById('taskInput').value = '';
            document.getElementById('taskCat').value = '';
            renderTodos();
        });
        document.getElementById('taskInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('taskAddBtn').click(); });
        document.getElementById('clearDone').addEventListener('click', () => { data.todos = data.todos.filter(t => !t.done); save(); renderTodos(); });
        renderTodos();
        renderFilters();
        updateCat();

        // Notes
        let notesTimeout;
        document.getElementById('notesArea').addEventListener('input', () => {
            document.getElementById('notesStatus').textContent = '...';
            clearTimeout(notesTimeout);
            notesTimeout = setTimeout(() => {
                data.notes = document.getElementById('notesArea').value;
                save();
                document.getElementById('notesStatus').textContent = 'Saved';
            }, 500);
        });
        document.getElementById('notesArea').value = data.notes;

        // Ambient
        function applyRain() {
            const con = document.getElementById('rainContainer');
            con.innerHTML = '';
            if (!data.rain) return;
            for (let i = 0; i < 100; i++) {
                const d = document.createElement('div');
                d.className = 'raindrop';
                d.style.left = Math.random() * 100 + 'vw';
                d.style.height = Math.random() * 12 + 8 + 'px';
                d.style.animationDuration = Math.random() * 1 + 0.5 + 's';
                d.style.animationDelay = Math.random() * 2 + 's';
                d.style.opacity = Math.random() * 0.4 + 0.2;
                con.appendChild(d);
            }
        }

        document.getElementById('rainToggle').addEventListener('click', () => { data.rain = !data.rain; document.getElementById('rainToggle').classList.toggle('active', data.rain); save(); applyRain(); });
        if (data.rain) document.getElementById('rainToggle').classList.add('active');
        applyRain();

        document.getElementById('soundToggle').addEventListener('click', () => {
            data.sound = !data.sound;
            document.getElementById('soundToggle').classList.toggle('active', data.sound);
            if (data.sound) { document.getElementById('rainAudio').volume = 0.3; document.getElementById('rainAudio').play().catch(() => {}); }
            else { document.getElementById('rainAudio').pause(); }
            save();
        });

        function applyLight() { document.body.classList.toggle('light-mode', data.light); document.getElementById('lightToggle').classList.toggle('active', data.light); }
        document.getElementById('lightToggle').addEventListener('click', () => { data.light = !data.light; applyLight(); save(); });
        applyLight();

        // Stars
        function applyStars() {
            const con = document.getElementById('rainContainer');
            if (!data.stars) {
                Array.from(con.getElementsByClassName('star')).forEach(el => el.remove());
                return;
            }
            for (let i = 0; i < 50; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                s.style.left = Math.random() * 100 + 'vw';
                s.style.top = Math.random() * 50 + 'vh';
                s.style.animationDelay = Math.random() * 2 + 's';
                con.appendChild(s);
            }
        }
        document.getElementById('starToggle').addEventListener('click', () => { data.stars = !data.stars; document.getElementById('starToggle').classList.toggle('active', data.stars); save(); applyStars(); });
        if (data.stars) document.getElementById('starToggle').classList.add('active');
        applyStars();

        // Snow
        function applySnow() {
            const con = document.getElementById('rainContainer');
            if (!data.snow) {
                Array.from(con.getElementsByClassName('snowflake')).forEach(el => el.remove());
                return;
            }
            for (let i = 0; i < 80; i++) {
                const s = document.createElement('div');
                s.className = 'snowflake';
                s.style.left = Math.random() * 100 + 'vw';
                s.style.animationDuration = Math.random() * 3 + 2 + 's';
                s.style.animationDelay = Math.random() * 3 + 's';
                s.style.opacity = Math.random() * 0.5 + 0.3;
                con.appendChild(s);
            }
        }
        document.getElementById('snowToggle').addEventListener('click', () => { data.snow = !data.snow; document.getElementById('snowToggle').classList.toggle('active', data.snow); save(); applySnow(); });
        if (data.snow) document.getElementById('snowToggle').classList.add('active');
        applySnow();

        // Fireflies
        function applyFireflies() {
            const con = document.getElementById('rainContainer');
            if (!data.fireflies) {
                Array.from(con.getElementsByClassName('firefly')).forEach(el => el.remove());
                return;
            }
            for (let i = 0; i < 15; i++) {
                const f = document.createElement('div');
                f.className = 'firefly';
                f.style.left = Math.random() * 100 + 'vw';
                f.style.top = Math.random() * 80 + 10 + '%';
                f.style.animationDelay = Math.random() * 5 + 's';
                con.appendChild(f);
            }
        }
        document.getElementById('fireflyToggle').addEventListener('click', () => { data.fireflies = !data.fireflies; document.getElementById('fireflyToggle').classList.toggle('active', data.fireflies); save(); applyFireflies(); });
        if (data.fireflies) document.getElementById('fireflyToggle').classList.add('active');
        applyFireflies();

        // Theme
        function applyTheme(name) {
            const t = themes.find(th => th.name === name) || themes[0];
            document.documentElement.style.setProperty('--bg', t.bg);
            document.documentElement.style.setProperty('--primary', t.primary);
            document.documentElement.style.setProperty('--primary-glow', t.primary + '66');
            document.documentElement.style.setProperty('--secondary', t.secondary || t.primary);
            data.theme = name;
            save();
            document.querySelectorAll('.theme-box').forEach(b => b.classList.toggle('active', b.dataset.theme === name));
        }

        document.getElementById('settingsBtn').addEventListener('click', () => {
            document.getElementById('themeGrid').innerHTML = themes.map(t => `<div class="theme-box ${t.name === data.theme ? 'active' : ''}" style="background:${t.bg};border:3px solid ${t.primary}" data-theme="${t.name}"></div>`).join('');
            document.querySelectorAll('.theme-box').forEach(b => b.addEventListener('click', () => applyTheme(b.dataset.theme)));
            document.getElementById('settingsModal').classList.add('active');
        });
        document.getElementById('settingsDone').addEventListener('click', () => document.getElementById('settingsModal').classList.remove('active'));
        applyTheme(data.theme);

        // Tags
        function renderTags() {
            document.getElementById('tagsList').innerHTML = data.tags.map((t, i) => `<div class="tag-item"><div class="tag-name"><span class="tag-color" style="background:${t.color}"></span>${t.name}</div><button class="tag-x" data-i="${i}">×</button></div>`).join('');
            document.querySelectorAll('.tag-x').forEach(b => b.addEventListener('click', () => { data.tags.splice(b.dataset.i, 1); save(); renderTags(); renderFilters(); updateCat(); }));
        }

        document.getElementById('addTagBtn').addEventListener('click', () => { renderTags(); document.getElementById('tagsModal').classList.add('active'); });
        document.getElementById('addTag').addEventListener('click', () => {
            const name = document.getElementById('tagName').value.trim().toLowerCase();
            if (!name || data.tags.some(t => t.name === name)) return;
            data.tags.push({ name, color: document.getElementById('tagColor').value });
            save();
            document.getElementById('tagName').value = '';
            renderTags();
            renderFilters();
            updateCat();
        });
        document.getElementById('tagName').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('addTag').click(); });
        document.getElementById('tagsDone').addEventListener('click', () => document.getElementById('tagsModal').classList.remove('active'));
        renderTags();

        // Backup
        document.getElementById('backupBtn').addEventListener('click', () => document.getElementById('backupModal').classList.add('active'));
        document.getElementById('exportBtn').addEventListener('click', () => {
            const backup = { todos: data.todos, notes: data.notes, tags: data.tags, links: data.links, exported: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'lifeos-backup-' + new Date().toISOString().split('T')[0] + '.json';
            a.click();
            URL.revokeObjectURL(url);
        });
        document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
        document.getElementById('importFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const backup = JSON.parse(event.target.result);
                    if (backup.todos) data.todos = backup.todos;
                    if (backup.notes !== undefined) data.notes = backup.notes;
                    if (backup.tags) data.tags = backup.tags;
                    if (backup.links) data.links = backup.links;
                    save();
                    refreshUI();
                    alert('Backup restored successfully!');
                } catch (err) {
                    alert('Invalid backup file!');
                }
            };
            reader.readAsText(file);
        });
        document.getElementById('backupDone').addEventListener('click', () => document.getElementById('backupModal').classList.remove('active'));

        // Keyboard
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            if (e.key === 'n') document.getElementById('taskInput').focus();
            if (e.key === 'r') document.getElementById('rainToggle').click();
            if (e.key === 's') document.getElementById('soundToggle').click();
            if (e.key === 'l') document.getElementById('lightToggle').click();
            if (e.key === ',') document.getElementById('settingsBtn').click();
        });

        // Auth init
        if (auth.token) {
            updateAuthUI();
            loadFromGist();
        } else {
            updateAuthUI();
        }

        document.getElementById('syncBtn').addEventListener('click', async () => {
            await syncGist();
            alert('Synced to Gist!');
        });
    </script>
</body>
</html>
