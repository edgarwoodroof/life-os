<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f1a;
            --bg-alt: #16162a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-hover: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-hover: rgba(255, 255, 255, 0.15);
            --primary: #c9a8ff;
            --primary-glow: rgba(201, 168, 255, 0.4);
            --secondary: #8b7ec8;
            --text: #e8e8f0;
            --text-dim: #6a6a80;
            --rain: rgba(174, 194, 224, 0.25);
            --danger: #ff6b6b;
            --success: #6bcf6b;
            --accent-blue: #5ca8ff;
            --accent-pink: #ff6b9d;
            --accent-orange: #ffb347;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1), color 0.5s ease;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(120, 80, 200, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 100% 100%, rgba(80, 60, 150, 0.1), transparent);
            pointer-events: none;
            z-index: -2;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 320px 1fr 340px;
            gap: 28px;
            min-height: calc(100vh - 48px);
            align-items: start;
        }

        .panel {
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 28px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--glass-border-hover), transparent);
            opacity: 0.5;
        }

        .panel:hover {
            background: var(--glass-hover);
            border-color: var(--glass-border-hover);
            transform: translateY(-2px);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.3),
                0 0 60px rgba(201, 168, 255, 0.08);
        }

        .left-sidebar {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .right-sidebar {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .panel-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-title::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--primary-glow);
        }

        /* Clock Widget */
        .clock-panel {
            padding: 32px;
        }

        .clock-main {
            margin-bottom: 28px;
        }

        .clock-display {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 56px;
            font-weight: 300;
            color: var(--text);
            letter-spacing: 2px;
            line-height: 1;
            background: linear-gradient(135deg, var(--text) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            filter: drop-shadow(0 0 30px var(--primary-glow));
        }

        .clock-seconds {
            font-size: 24px;
            font-weight: 300;
            color: var(--primary);
            opacity: 0.7;
            margin-left: 4px;
        }

        .clock-date {
            font-size: 15px;
            color: var(--text-dim);
            margin-top: 16px;
            letter-spacing: 0.5px;
        }

        .clock-greeting {
            font-size: 20px;
            font-weight: 400;
            color: var(--secondary);
            margin-top: 12px;
            padding: 12px 16px;
            background: var(--glass);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .clock-controls {
            display: flex;
            gap: 8px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .clock-format-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 10px 16px;
            color: var(--text-dim);
            font-family: 'Outfit', sans-serif;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .clock-format-btn:hover, .clock-format-btn.active {
            background: var(--primary);
            color: var(--bg);
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        /* Weather Widget */
        .weather-panel {
            padding: 28px;
        }

        .weather-main {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .weather-icon-container {
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--glass);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            position: relative;
        }

        .weather-icon {
            font-size: 48px;
            animation: weatherFloat 3s ease-in-out infinite;
        }

        @keyframes weatherFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(5deg); }
        }

        .weather-info {
            flex: 1;
        }

        .weather-temp {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        .temp-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 44px;
            font-weight: 300;
            line-height: 1;
        }

        .temp-unit {
            font-size: 18px;
            color: var(--text-dim);
        }

        .temp-convert {
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        .weather-condition {
            font-size: 15px;
            color: var(--secondary);
            margin-top: 8px;
        }

        .weather-location {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            padding: 10px 14px;
            background: var(--glass);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .weather-location:hover {
            border-color: var(--primary);
        }

        .location-icon {
            font-size: 14px;
        }

        .location-text {
            flex: 1;
            font-size: 13px;
            color: var(--text-dim);
        }

        .location-edit {
            font-size: 12px;
            color: var(--primary);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .weather-location:hover .location-edit {
            opacity: 1;
        }

        .weather-controls {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .weather-btn {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px;
            color: var(--text-dim);
            font-family: 'Outfit', sans-serif;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .weather-btn:hover {
            background: var(--glass-hover);
            color: var(--text);
            border-color: var(--glass-border-hover);
        }

        .weather-btn.active {
            background: var(--primary);
            color: var(--bg);
            border-color: var(--primary);
        }

        /* To-Do List */
        .todo-panel {
            display: flex;
            flex-direction: column;
            min-height: 520px;
            max-height: calc(100vh - 100px);
        }

        .todo-input-wrapper {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .todo-input {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px 20px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .todo-input::placeholder {
            color: var(--text-dim);
        }

        .todo-input:focus {
            border-color: var(--primary);
            box-shadow: 
                0 0 0 3px rgba(201, 168, 255, 0.1),
                0 8px 32px rgba(201, 168, 255, 0.15);
        }

        .todo-category-select {
            width: 120px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .todo-category-select:focus {
            border-color: var(--primary);
        }

        .todo-category-select option {
            background: var(--bg);
            color: var(--text);
        }

        .todo-add-btn {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent-pink) 100%);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(201, 168, 255, 0.3);
        }

        .todo-add-btn:hover {
            transform: scale(1.08) rotate(90deg);
            box-shadow: 0 8px 32px rgba(201, 168, 255, 0.5);
        }

        .todo-add-btn:active {
            transform: scale(0.95);
        }

        .todo-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .todo-filter-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 10px 20px;
            color: var(--text-dim);
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .todo-filter-btn:hover {
            color: var(--text);
            border-color: var(--glass-border-hover);
        }

        .todo-filter-btn.active {
            background: var(--primary);
            color: var(--bg);
            border-color: var(--primary);
            box-shadow: 0 4px 16px var(--primary-glow);
        }

        .todo-list-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 8px;
            min-height: 150px;
        }

        .todo-list-container::-webkit-scrollbar {
            width: 4px;
        }

        .todo-list-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .todo-list-container::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 2px;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 18px 20px;
            transition: all 0.3s ease;
            animation: todoSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes todoSlideIn {
            from { 
                opacity: 0; 
                transform: translateX(-20px) scale(0.95); 
            }
            to { 
                opacity: 1; 
                transform: translateX(0) scale(1); 
            }
        }

        .todo-item:hover {
            border-color: var(--glass-border-hover);
            background: var(--glass-hover);
            transform: translateX(4px);
        }

        .todo-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--glass-border-hover);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .todo-checkbox::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--success) 0%, #4f9 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .todo-checkbox.checked::before {
            opacity: 1;
        }

        .todo-checkbox.checked {
            border-color: var(--success);
        }

        .todo-checkbox.checked::after {
            content: '✓';
            position: relative;
            z-index: 1;
            color: white;
            font-size: 13px;
            font-weight: 600;
        }

        .todo-checkbox:hover {
            border-color: var(--primary);
            transform: scale(1.1);
        }

        .todo-content {
            flex: 1;
            min-width: 0;
        }

        .todo-text {
            font-size: 15px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: var(--text-dim);
            opacity: 0.6;
        }

        .todo-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 6px;
        }

        .todo-category {
            font-size: 10px;
            padding: 5px 12px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .todo-category.work { 
            background: rgba(92, 168, 255, 0.2); 
            color: var(--accent-blue); 
        }
        .todo-category.personal { 
            background: rgba(255, 107, 157, 0.2); 
            color: var(--accent-pink); 
        }
        .todo-category.urgent { 
            background: rgba(255, 107, 107, 0.2); 
            color: var(--danger); 
        }

        .todo-delete-btn {
            width: 32px;
            height: 32px;
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 18px;
            opacity: 0;
            border-radius: 8px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .todo-item:hover .todo-delete-btn {
            opacity: 1;
        }

        .todo-delete-btn:hover {
            color: var(--danger);
            background: rgba(255, 107, 107, 0.1);
        }

        .todo-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--glass-border);
        }

        .todo-count-text {
            font-size: 13px;
            color: var(--text-dim);
        }

        .todo-clear-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 10px 18px;
            color: var(--text-dim);
            font-family: 'Outfit', sans-serif;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .todo-clear-btn:hover {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }

        .manage-tags-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 6px 12px;
            color: var(--text-dim);
            font-family: 'Outfit', sans-serif;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .manage-tags-btn:hover {
            background: var(--primary);
            color: var(--bg);
        }

        .settings-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 6px 10px;
            color: var(--text-dim);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .settings-btn:hover {
            background: var(--primary);
            color: var(--bg);
        }

        /* Notes Panel */
        .notes-panel {
            display: flex;
            flex-direction: column;
            min-height: 300px;
            flex: 1;
        }

        .notes-textarea {
            flex: 1;
            min-height: 180px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 20px;
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 14px;
            line-height: 1.7;
            resize: none;
            outline: none;
            transition: all 0.3s ease;
        }

        .notes-textarea::placeholder {
            color: var(--text-dim);
        }

        .notes-textarea:focus {
            border-color: var(--primary);
            box-shadow: 
                0 0 0 3px rgba(201, 168, 255, 0.1),
                0 8px 32px rgba(201, 168, 255, 0.15);
        }

        .notes-status {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .notes-status-dot {
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            animation: statusPulse 2s ease-in-out infinite;
        }

        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Controls */
        .ambient-panel {
            padding: 24px;
        }

        .ambient-controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .ambient-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px 20px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .ambient-btn:hover {
            background: var(--glass-hover);
            border-color: var(--glass-border-hover);
            transform: translateX(4px);
        }

        .ambient-btn.active {
            background: linear-gradient(135deg, rgba(201, 168, 255, 0.15) 0%, rgba(255, 107, 157, 0.15) 100%);
            border-color: var(--primary);
            box-shadow: 0 0 24px rgba(201, 168, 255, 0.2);
        }

        .ambient-icon {
            font-size: 22px;
        }

        .ambient-label {
            flex: 1;
        }

        .ambient-toggle {
            width: 44px;
            height: 24px;
            background: var(--glass);
            border-radius: 12px;
            position: relative;
            transition: all 0.3s ease;
        }

        .ambient-toggle::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 18px;
            height: 18px;
            background: var(--text-dim);
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .ambient-btn.active .ambient-toggle {
            background: var(--primary);
        }

        .ambient-btn.active .ambient-toggle::after {
            left: 23px;
            background: white;
        }

        .planner-panel {
            display: flex;
            flex-direction: column;
        }

        .planner-nav-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            gap: 12px;
        }

        .planner-current-date {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
        }

        .planner-arrow {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            width: 32px;
            height: 32px;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .planner-arrow:hover {
            background: var(--glass-hover);
            color: var(--text);
        }

        .planner-list {
            flex: 1;
            overflow-y: auto;
            max-height: 200px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
        }

        .planner-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .planner-item:hover {
            border-color: var(--glass-border-hover);
        }

        .planner-time-col {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            color: var(--primary);
            min-width: 55px;
        }

        .planner-task-col {
            flex: 1;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .planner-remove {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s ease;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }

        .planner-item:hover .planner-remove {
            opacity: 1;
        }

        .planner-remove:hover {
            color: var(--danger);
            background: rgba(255,107,107,0.1);
        }

        .planner-add-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .plan-time {
            width: 85px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 8px 10px;
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            outline: none;
        }

        .plan-time:focus, .plan-task:focus {
            border-color: var(--primary);
        }

        .plan-task {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            outline: none;
        }

        .plan-add-button {
            width: 36px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: var(--bg);
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .plan-add-button:hover {
            transform: scale(1.05);
        }

        /* Settings */
        .settings-option {
            margin-bottom: 20px;
        }

        .settings-label {
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .theme-swatch {
            aspect-ratio: 1;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .theme-swatch:hover {
            transform: scale(1.1);
        }

        .theme-swatch.active {
            border-color: var(--text);
        }

        .font-selector {
            display: flex;
            gap: 8px;
        }

        .font-option {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 10px;
            color: var(--text-dim);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .font-option:hover, .font-option.active {
            background: var(--primary);
            color: var(--bg);
        }

        /* Rain Effect */
        .rain-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .raindrop {
            position: absolute;
            width: 2px;
            background: linear-gradient(to bottom, transparent, var(--rain));
            border-radius: 2px;
            animation: rainFall linear infinite;
            opacity: 0;
        }

        @keyframes rainFall {
            0% {
                transform: translateY(-100vh);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.15;
            animation: particleFloat 15s ease-in-out infinite;
        }

        @keyframes particleFloat {
            0%, 100% { 
                transform: translateY(0) translateX(0); 
                opacity: 0.15;
            }
            25% { 
                transform: translateY(-100px) translateX(50px); 
                opacity: 0.3;
            }
            50% { 
                transform: translateY(-200px) translateX(-30px); 
                opacity: 0.15;
            }
            75% { 
                transform: translateY(-300px) translateX(40px); 
                opacity: 0.3;
            }
        }

        /* Audio */
        audio {
            display: none;
        }

        /* Theme variations */
        body.sunny {
            --bg: #1a1610;
            --bg-alt: #241c12;
            --glass: rgba(255, 179, 71, 0.05);
            --glass-hover: rgba(255, 179, 71, 0.1);
            --glass-border: rgba(255, 179, 71, 0.15);
            --glass-border-hover: rgba(255, 204, 51, 0.25);
            --primary: #ffb347;
            --primary-glow: rgba(255, 179, 71, 0.4);
            --secondary: #ffcc33;
            --text: #fff5e6;
            --rain: rgba(255, 204, 51, 0.2);
        }

        body.cloudy {
            --bg: #1a1a24;
            --bg-alt: #222230;
            --glass: rgba(122, 122, 140, 0.05);
            --glass-hover: rgba(122, 122, 140, 0.1);
            --glass-border: rgba(122, 122, 140, 0.15);
            --glass-border-hover: rgba(122, 122, 140, 0.25);
            --primary: #9a9aac;
            --primary-glow: rgba(154, 154, 172, 0.3);
            --secondary: #7a7a8c;
            --rain: rgba(154, 154, 172, 0.15);
        }

        body.night {
            --bg: #08080f;
            --bg-alt: #0c0c18;
            --glass: rgba(45, 27, 105, 0.08);
            --glass-hover: rgba(45, 27, 105, 0.15);
            --glass-border: rgba(139, 92, 246, 0.2);
            --glass-border-hover: rgba(139, 92, 246, 0.35);
            --primary: #a78bfa;
            --primary-glow: rgba(167, 139, 250, 0.4);
            --secondary: #8b5cf6;
            --rain: rgba(139, 92, 246, 0.2);
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }

        .empty-icon {
            font-size: 52px;
            margin-bottom: 16px;
            opacity: 0.4;
            animation: emptyBounce 2s ease-in-out infinite;
        }

        @keyframes emptyBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .empty-text {
            font-size: 15px;
            color: var(--text-dim);
        }

        /* Location modal */
        .location-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .location-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .location-modal-content {
            background: var(--bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px;
            width: 90%;
            max-width: 400px;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .location-modal.active .location-modal-content {
            transform: scale(1);
        }

        .location-modal-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .location-modal-input {
            width: 100%;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 16px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            outline: none;
            margin-bottom: 16px;
        }

        .location-modal-input:focus {
            border-color: var(--primary);
        }

        .location-modal-buttons {
            display: flex;
            gap: 12px;
        }

        .location-modal-btn {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 14px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .location-modal-btn:hover {
            background: var(--glass-hover);
        }

        .location-modal-btn.primary {
            background: var(--primary);
            color: var(--bg);
            border-color: var(--primary);
        }

        .location-modal-btn.primary:hover {
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .tags-list {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 16px;
        }

        .tag-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .tag-name {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        .tag-color-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .tag-delete {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .tag-delete:hover {
            color: var(--danger);
            background: rgba(255, 107, 107, 0.1);
        }

        .add-tag-wrapper {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .add-tag-wrapper input[type="color"] {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: var(--glass);
        }

        .add-tag-wrapper .location-modal-input {
            flex: 1;
        }

        .add-tag-wrapper .location-modal-btn {
            width: auto;
            padding: 12px 20px;
        }

        /* Responsive */
        @media (max-width: 1100px) {
            .dashboard {
                grid-template-columns: 280px 1fr;
            }
            .right-sidebar {
                grid-column: span 2;
                grid-row: 1;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 24px;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
            
            .dashboard {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .panel {
                padding: 20px;
            }

            .clock-display {
                font-size: 42px;
            }

            .todo-panel, .notes-panel {
                min-height: auto;
                max-height: none;
            }

            .weather-main {
                flex-direction: column;
                text-align: center;
            }

            .weather-icon-container {
                width: 80px;
                height: 80px;
            }

            .temp-value {
                font-size: 36px;
            }

            .right-sidebar {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="rain-container" id="rainContainer"></div>

    <div class="container">
        <div class="dashboard">
            <!-- Left Sidebar -->
            <div class="left-sidebar">
                <div class="panel clock-panel">
                    <div class="panel-header">
                        <div class="panel-title">Time</div>

                            <span id="clockHour">00</span>:<span id="clockMin">00</span><span class="clock-seconds" id="clockSec">:00</span>

                    </div>
                    <div class="ambient-controls">

                            <span class="ambient-icon">🌧️</span>

                </div>
            </div>

            <!-- Planner -->
            <div class="panel planner-panel">
                <div class="panel-header">
                    <div class="panel-title">Planner</div>
                </div>
                <div class="planner-nav-row">
                    <button class="planner-arrow" id="prevDay">←</button>

                <div class="planner-add-row">

            <div class="main-content">

                    <div class="todo-list-container" id="todoList"></div>

            <!-- Right Sidebar -->
            <div class="right-sidebar">

                        </div>
                        <div class="weather-info">
                            <div class="weather-temp">
                                <span class="temp-value" id="tempC">--</span>
                                <span class="temp-unit">°C</span>

                            <div class="temp-convert">
                                <span id="tempF">--</span>°F
                            </div>

                        </div>
                    </div>
                    <div class="weather-location" id="locationBtn">
                        <span class="location-icon">📍</span>
                        <span class="location-text" id="locationText">Detecting location...</span>

                    <div class="weather-controls">

                <div class="panel notes-panel">

    <!-- Manage Tags Modal -->
    <div class="location-modal" id="tagsModal">
        <div class="location-modal-content">

            <div class="add-tag-wrapper">
                <input type="text" class="location-modal-input" id="newTagInput" placeholder="New tag name...">

            <div class="location-modal-buttons">
                <button class="location-modal-btn" id="locationCancelBtn">Cancel</button>
                <button class="location-modal-btn primary" id="locationSaveBtn">Save</button>
            </div>
        </div>

    <!-- Settings Modal -->
    <div class="location-modal" id="settingsModal">
        <div class="location-modal-content" style="max-width:420px">
            <div class="location-modal-title">Customize</div>
            
            <div class="settings-option">
                <div class="settings-label">Theme</div>
                <div class="theme-grid" id="themeGrid"></div>
            </div>
            
            <div class="settings-option">
                <div class="settings-label">Accent Color</div>
                <input type="color" id="accentPicker" value="#c9a8ff" style="width:100%;height:40px;border-radius:10px;border:none;cursor:pointer">
            </div>
            
            <div class="settings-option">
                <div class="settings-label">Font</div>
                <div class="font-selector">
                    <button class="font-option" data-font="Outfit">Modern</button>
                    <button class="font-option" data-font="IBM Plex Mono">Mono</button>
                    <button class="font-option" data-font="Space Grotesk">Space</button>
                </div>
            </div>
            
            <div class="location-modal-buttons">
                <button class="location-modal-btn primary" id="settingsDoneBtn">Done</button>
            </div>
        </div>

    <audio id="rainAudio" loop>
        <source src="https://cdn.pixabay.com/audio/2022/05/13/audio_257112d7b0.mp3" type="audio/mpeg">
    </audio>

    <script>
        // State
        let todos = JSON.parse(localStorage.getItem('todos')) || [];
        let notes = localStorage.getItem('notes') || '';
        let customTags = JSON.parse(localStorage.getItem('customTags')) || [
            { name: 'work', color: '#5ca8ff' },
            { name: 'personal', color: '#ff6b9d' },
            { name: 'urgent', color: '#ff6b6b' }
        ];
        let currentFilter = 'all';
        let rainEnabled = localStorage.getItem('rainEnabled') === 'true';
        let audioEnabled = localStorage.getItem('audioEnabled') === 'true';
        let glowEnabled = localStorage.getItem('glowEnabled') === 'true';
        let manualTheme = localStorage.getItem('manualTheme') === 'true';
        let clockFormat = localStorage.getItem('clockFormat') || '12';
        let dateFormat = localStorage.getItem('dateFormat') || 'en';
        let manualLocation = localStorage.getItem('manualLocation') || '';

        // Planner state
        let plannerData = JSON.parse(localStorage.getItem('plannerData')) || {};
        let currentPlannerDate = new Date().toISOString().split('T')[0];

        // Weather state
        let weatherLocation = {
            lat: 35.0116,
            lon: 135.7681,
            name: 'Kyoto, JP'
        };

        let currentWeather = {
            temp: 15,
            condition: 'rainy'
        };

        // Planner
        function renderPlanner() {
            const container = document.getElementById('plannerList');
            const d = new Date(currentPlannerDate);
            document.getElementById('plannerDateDisplay').textContent = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            
            const plans = plannerData[currentPlannerDate] || [];
            
            if (plans.length === 0) {
                container.innerHTML = '<div class="empty-state" style="padding:16px"><div class="empty-text">No plans</div></div>';
            } else {
                container.innerHTML = plans.sort((a, b) => a.time.localeCompare(b.time)).map((plan, i) => `
                    <div class="planner-item">
                        <div class="planner-time-col">${plan.time}</div>
                        <div class="planner-task-col">${escapeHtml(plan.task)}</div>
                        <button class="planner-remove" data-index="${i}">×</button>
                    </div>
                `).join('');
                
                container.querySelectorAll('.planner-remove').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const idx = parseInt(btn.dataset.index);
                        plannerData[currentPlannerDate].splice(idx, 1);
                        localStorage.setItem('plannerData', JSON.stringify(plannerData));
                        renderPlanner();
                    });
                });
            }
        }

        function addPlan() {
            const time = document.getElementById('planTimeInput').value;
            const task = document.getElementById('planTaskInput').value.trim();
            if (!time || !task) return;
            
            if (!plannerData[currentPlannerDate]) plannerData[currentPlannerDate] = [];
            plannerData[currentPlannerDate].push({ time: time, task: task });
            localStorage.setItem('plannerData', JSON.stringify(plannerData));
            
            document.getElementById('planTimeInput').value = '';
            document.getElementById('planTaskInput').value = '';
            renderPlanner();
        }

        document.getElementById('prevDay').addEventListener('click', () => {
            const d = new Date(currentPlannerDate);
            d.setDate(d.getDate() - 1);
            currentPlannerDate = d.toISOString().split('T')[0];
            renderPlanner();
        });

        document.getElementById('nextDay').addEventListener('click', () => {
            const d = new Date(currentPlannerDate);
            d.setDate(d.getDate() + 1);
            currentPlannerDate = d.toISOString().split('T')[0];
            renderPlanner();
        });

        document.getElementById('planAddButton').addEventListener('click', addPlan);
        document.getElementById('planTaskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addPlan();
        });

        renderPlanner();

        // Settings
        const themes = [
            { name: 'rainy', bg: '#0f0f1a', primary: '#c9a8ff' },
            { name: 'sunny', bg: '#1a1610', primary: '#ffb347' },
            { name: 'cloudy', bg: '#1a1a24', primary: '#9a9aac' },
            { name: 'night', bg: '#08080f', primary: '#a78bfa' },
            { name: 'ocean', bg: '#0a1628', primary: '#38bdf8' },
            { name: 'forest', bg: '#0a1a0f', primary: '#4ade80' },
            { name: 'rose', bg: '#1a0a14', primary: '#fb7185' },
            { name: 'midnight', bg: '#0a0a1a', primary: '#6366f1' }
        ];

        let currentTheme = localStorage.getItem('currentTheme') || 'rainy';
        let currentFont = localStorage.getItem('currentFont') || 'Outfit';

        function applyTheme(themeName) {
            const theme = themes.find(t => t.name === themeName) || themes[0];
            const root = document.documentElement;
            root.style.setProperty('--bg', theme.bg);
            root.style.setProperty('--primary', theme.primary);
            root.style.setProperty('--primary-glow', theme.primary + '66');
            currentTheme = themeName;
            localStorage.setItem('currentTheme', themeName);
            
            document.querySelectorAll('.theme-swatch').forEach(s => {
                s.classList.toggle('active', s.dataset.theme === themeName);
            });
        }

        function renderThemeGrid() {
            const grid = document.getElementById('themeGrid');
            grid.innerHTML = themes.map(t => `
                <div class="theme-swatch ${t.name === currentTheme ? 'active' : ''}" 
                     style="background:${t.bg};border:3px solid ${t.primary}"
                     data-theme="${t.name}" title="${t.name}"></div>
            `).join('');
            
            grid.querySelectorAll('.theme-swatch').forEach(s => {
                s.addEventListener('click', () => applyTheme(s.dataset.theme));
            });
        }

        document.getElementById('accentPicker').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--primary', e.target.value);
            document.documentElement.style.setProperty('--primary-glow', e.target.value + '66');
        });

        document.querySelectorAll('.font-option').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.font-option').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFont = btn.dataset.font;
                localStorage.setItem('currentFont', currentFont);
                document.body.style.fontFamily = currentFont === 'IBM Plex Mono' ? "'IBM Plex Mono', sans-serif" : 
                                               currentFont === 'Space Grotesk' ? "'Space Grotesk', sans-serif" : "'Outfit', sans-serif";
            });
        });

        document.getElementById('settingsBtn').addEventListener('click', () => {
            renderThemeGrid();
            document.querySelectorAll('.font-option').forEach(b => {
                b.classList.toggle('active', b.dataset.font === currentFont);
            });
            document.getElementById('settingsModal').classList.add('active');
        });

        document.getElementById('settingsDoneBtn').addEventListener('click', () => {
            document.getElementById('settingsModal').classList.remove('active');
        });

        document.getElementById('settingsModal').addEventListener('click', (e) => {
            if (e.target.id === 'settingsModal') {
                document.getElementById('settingsModal').classList.remove('active');
            }
        });

        // Tag management
        function saveTags() {
            localStorage.setItem('customTags', JSON.stringify(customTags));
        }

        function renderTagsList() {
            const tagsList = document.getElementById('tagsList');
            tagsList.innerHTML = customTags.map((tag, index) => `
                <div class="tag-item">
                    <div class="tag-name">
                        <span class="tag-color-dot" style="background: ${tag.color}"></span>
                        ${escapeHtml(tag.name)}
                    </div>
                    <button class="tag-delete" data-index="${index}">×</button>
                </div>
            `).join('');

            document.querySelectorAll('.tag-delete').forEach(btn => {
                btn.addEventListener('click', () => {
                    customTags.splice(parseInt(btn.dataset.index), 1);
                    saveTags();
                    renderTagsList();
                    updateCategorySelect();
                });
            });
        }

        function updateCategorySelect() {
            const select = document.getElementById('categorySelect');
            select.innerHTML = '<option value="">Tag</option>' +
                customTags.map(tag => `<option value="${tag.name}">${tag.name}</option>`).join('');
        }

        function addTag() {
            const input = document.getElementById('newTagInput');
            const colorPicker = document.getElementById('newTagColor');
            const name = input.value.trim().toLowerCase();
            if (!name) return;
            if (customTags.some(t => t.name === name)) return;
            customTags.push({ name, color: colorPicker.value });
            input.value = '';
            saveTags();
            renderTagsList();
            updateCategorySelect();
        }

        document.getElementById('manageTagsBtn').addEventListener('click', () => {
            renderTagsList();
            document.getElementById('tagsModal').classList.add('active');
        });
        document.getElementById('tagsCloseBtn').addEventListener('click', () => {
            document.getElementById('tagsModal').classList.remove('active');
        });
        document.getElementById('addTagBtn').addEventListener('click', addTag);
        document.getElementById('newTagInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTag();
        });

        // Initialize particles
        function createParticles() {
            const container = document.getElementById('particles');
            container.innerHTML = '';
            if (!glowEnabled) return;

            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 15) + 's';
                container.appendChild(particle);
            }
        }

        // Clock
        let clockInterval;
        function updateClock() {
            const now = new Date();
            const hour24 = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();

            let hour12 = hour24 % 12;
            if (hour12 === 0) hour12 = 12;

            let displayHour = clockFormat === '12' ? hour12 : (clockFormat === '24' ? hour24 : hour24);
            
            document.getElementById('clockHour').textContent = String(displayHour).padStart(2, '0');
            document.getElementById('clockMin').textContent = String(minutes).padStart(2, '0');
            document.getElementById('clockSec').textContent = ':' + String(seconds).padStart(2, '0');

            // Date
            let dateStr;
            if (dateFormat === 'jp') {
                const jpFormats = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
                dateStr = now.toLocaleDateString('ja-JP', jpFormats);
            } else {
                const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                dateStr = now.toLocaleDateString('en-US', options);
            }
            document.getElementById('clockDate').textContent = dateStr;

            // Greeting
            let greeting = 'Good night';
            if (hour24 >= 5 && hour24 < 12) greeting = 'Good morning';
            else if (hour24 >= 12 && hour24 < 17) greeting = 'Good afternoon';
            else if (hour24 >= 17 && hour24 < 21) greeting = 'Good evening';
            document.getElementById('greeting').textContent = greeting;
        }

        document.querySelectorAll('.clock-format-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.clock-format-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                if (btn.dataset.format === 'jp') {
                    clockFormat = '24';
                    dateFormat = 'jp';
                } else {
                    clockFormat = btn.dataset.format;
                    dateFormat = 'en';
                }
                localStorage.setItem('clockFormat', clockFormat);
                localStorage.setItem('dateFormat', dateFormat);
                updateClock();
            });
        });

        // Format button states
        updateClock();
        document.querySelectorAll('.clock-format-btn').forEach(btn => {
            if (btn.dataset.format === '12') btn.classList.add('active');
        });
        setInterval(updateClock, 1000);

        // Geolocation
        function getAutoLocation() {
            if (!navigator.geolocation) {
                fetchWeather(weatherLocation.lat, weatherLocation.lon);
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    weatherLocation.lat = lat;
                    weatherLocation.lon = lon;
                    weatherLocation.name = 'Current Location';
                    
                    try {
                        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                        const data = await response.json();
                        if (data.address) {
                            const city = data.address.city || data.address.town || data.address.village || data.address.county;
                            const country = data.address.country_code?.toUpperCase();
                            weatherLocation.name = city ? `${city}, ${country}` : 'Current Location';
                        }
                    } catch (e) {
                        console.log('Reverse geocode failed');
                    }
                    
                    document.getElementById('locationText').textContent = weatherLocation.name;
                    fetchWeather(lat, lon);
                },
                (error) => {
                    console.log('Geolocation error:', error.message);
                    document.getElementById('locationText').textContent = weatherLocation.name;
                    fetchWeather(weatherLocation.lat, weatherLocation.lon);
                }
            );
        }

        // Weather
        async function fetchWeather(lat, lon) {
            try {
                const response = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`
                );
                const data = await response.json();

                if (data.current_weather) {
                    currentWeather.temp = data.current_weather.temperature;
                    const code = data.current_weather.weathercode;
                    const isDay = data.current_weather.is_day !== 0;

                    if (code === 0) {
                        currentWeather.condition = isDay ? 'sunny' : 'clear';
                    } else if (code >= 1 && code <= 3) {
                        currentWeather.condition = 'cloudy';
                    } else if (code >= 51 && code <= 67 || code >= 80 && code <= 82) {
                        currentWeather.condition = 'rainy';
                    } else if (code >= 71 && code <= 77) {
                        currentWeather.condition = 'snowy';
                    } else {
                        currentWeather.condition = 'rainy';
                    }

                    updateWeatherDisplay();
                    if (!manualTheme) applyWeatherTheme();
                }
            } catch (error) {
                console.log('Weather fetch failed:', error);
            }
        }

        function updateWeatherDisplay() {
            const tempC = Math.round(currentWeather.temp);
            const tempF = Math.round(tempC * 9/5 + 32);

            document.getElementById('tempC').textContent = tempC;
            document.getElementById('tempF').textContent = tempF;

            const icons = {
                sunny: '☀️',
                cloudy: '☁️',
                rainy: '🌧️',
                clear: '🌙',
                snowy: '❄️'
            };
            document.getElementById('weatherIcon').textContent = icons[currentWeather.condition] || '🌧️';

            const conditions = {
                sunny: 'Sunny',
                cloudy: 'Cloudy',
                rainy: 'Rainy',
                clear: 'Clear',
                snowy: 'Snowy'
            };
            document.getElementById('weatherCondition').textContent = conditions[currentWeather.condition] || 'Unknown';
        }

        function applyWeatherTheme() {
            document.body.className = '';
            
            if (currentWeather.condition === 'sunny') {
                document.body.classList.add('sunny');
            } else if (currentWeather.condition === 'cloudy') {
                document.body.classList.add('cloudy');
            } else if (currentWeather.condition === 'clear' || currentWeather.condition === 'night') {
                document.body.classList.add('night');
            } else if (currentWeather.condition === 'snowy') {
                document.body.classList.add('cloudy');
            }
        }

        // Auto location on load
        getAutoLocation();

        // Manual location
        const locationModal = document.getElementById('locationModal');
        const locationInput = document.getElementById('locationInput');

        document.getElementById('locationBtn').addEventListener('click', () => {
            locationInput.value = manualLocation || '';
            locationModal.classList.add('active');
            locationInput.focus();
        });

        document.getElementById('locationCancelBtn').addEventListener('click', () => {
            locationModal.classList.remove('active');
        });

        document.getElementById('locationSaveBtn').addEventListener('click', async () => {
            const city = locationInput.value.trim();
            if (!city) {
                locationModal.classList.remove('active');
                return;
            }

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}`);
                const data = await response.json();
                
                if (data && data.length > 0) {
                    weatherLocation.lat = parseFloat(data[0].lat);
                    weatherLocation.lon = parseFloat(data[0].lon);
                    weatherLocation.name = data[0].display_name.split(',').slice(0, 2).join(',');
                    
                    manualLocation = data[0].display_name;
                    localStorage.setItem('manualLocation', manualLocation);
                    
                    document.getElementById('locationText').textContent = weatherLocation.name;
                    fetchWeather(weatherLocation.lat, weatherLocation.lon);
                }
            } catch (error) {
                console.log('Location search failed');
            }

            locationModal.classList.remove('active');
        });

        document.getElementById('autoLocationBtn').addEventListener('click', getAutoLocation);

        document.getElementById('manualThemeBtn').addEventListener('click', () => {
            manualTheme = !manualTheme;
            localStorage.setItem('manualTheme', manualTheme);
            document.getElementById('manualThemeBtn').classList.toggle('active', manualTheme);
            
            if (!manualTheme) {
                applyWeatherTheme();
            }
        });

        // To-Do List
        function getTagColor(tagName) {
            const tag = customTags.find(t => t.name === tagName);
            return tag ? tag.color : '#888';
        }

        function renderTodos() {
            const todoList = document.getElementById('todoList');
            
            let filtered = todos;
            if (currentFilter !== 'all') {
                filtered = todos.filter(t => t.category === currentFilter);
            }

            if (filtered.length === 0) {
                todoList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📝</div>
                        <div class="empty-text">No tasks yet. Add one above!</div>
                    </div>
                `;
            } else {
                todoList.innerHTML = filtered.map((todo, index) => {
                    const tagColor = getTagColor(todo.category);
                    return `
                        <div class="todo-item ${todo.completed ? 'completed' : ''}">
                            <div class="todo-checkbox ${todo.completed ? 'checked' : ''}" data-index="${index}"></div>
                            <div class="todo-content">
                                <div class="todo-text">${escapeHtml(todo.text)}</div>
                                ${todo.category ? `<div class="todo-meta"><span class="todo-category" style="background: ${tagColor}20; color: ${tagColor}">${todo.category}</span></div>` : ''}
                            </div>
                            <button class="todo-delete-btn" data-index="${index}">×</button>
                        </div>
                    `;
                }).join('');

                // Add event listeners
                document.querySelectorAll('.todo-checkbox').forEach(cb => {
                    cb.addEventListener('click', () => toggleTodo(parseInt(cb.dataset.index)));
                });
                document.querySelectorAll('.todo-delete-btn').forEach(btn => {
                    btn.addEventListener('click', () => deleteTodo(parseInt(btn.dataset.index)));
                });
            }

            const activeCount = todos.filter(t => !t.completed).length;
            document.getElementById('todoCount').textContent = `${activeCount} of ${todos.length} tasks remaining`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function addTodo() {
            const input = document.getElementById('todoInput');
            const category = document.getElementById('categorySelect').value;
            const text = input.value.trim();

            if (!text) return;

            todos.push({
                text,
                completed: false,
                category: category || ''
            });

            input.value = '';
            document.getElementById('categorySelect').value = '';
            saveTodos();
            renderTodos();
        }

        function toggleTodo(index) {
            let filtered = currentFilter === 'all' ? todos : todos.filter(t => t.category === currentFilter);
            const todo = filtered[index];
            const realIndex = todos.indexOf(todo);
            
            if (realIndex !== -1) {
                todos[realIndex].completed = !todos[realIndex].completed;
                saveTodos();
                renderTodos();
            }
        }

        function deleteTodo(index) {
            let filtered = currentFilter === 'all' ? todos : todos.filter(t => t.category === currentFilter);
            const todo = filtered[index];
            const realIndex = todos.indexOf(todo);
            
            if (realIndex !== -1) {
                todos.splice(realIndex, 1);
                saveTodos();
                renderTodos();
            }
        }

        function saveTodos() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

        document.getElementById('todoAddBtn').addEventListener('click', addTodo);
        document.getElementById('todoInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTodo();
        });

        function renderFilters() {
            const filtersContainer = document.getElementById('todoFilters');
            filtersContainer.innerHTML = '<button class="todo-filter-btn active" data-filter="all">All</button>' +
                customTags.map(tag => `
                    <button class="todo-filter-btn" data-filter="${tag.name}">${tag.name}</button>
                `).join('');
            
            document.querySelectorAll('.todo-filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.todo-filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    renderTodos();
                });
            });
        }

        renderFilters();
        updateCategorySelect();

        document.getElementById('clearCompletedBtn').addEventListener('click', () => {
            todos = todos.filter(t => !t.completed);
            saveTodos();
            renderTodos();
        });

        renderTodos();

        // Notes
        const notesTextarea = document.getElementById('notesTextarea');
        notesTextarea.value = notes;

        let notesTimeout;
        notesTextarea.addEventListener('input', () => {
            document.getElementById('notesStatus').textContent = 'Saving...';
            clearTimeout(notesTimeout);
            notesTimeout = setTimeout(() => {
                notes = notesTextarea.value;
                localStorage.setItem('notes', notes);
                document.getElementById('notesStatus').textContent = 'Auto-saved';
            }, 800);
        });

        // Rain Effect
        function createRain() {
            const container = document.getElementById('rainContainer');
            container.innerHTML = '';

            if (!rainEnabled) return;

            const dropCount = 150;
            for (let i = 0; i < dropCount; i++) {
                const drop = document.createElement('div');
                drop.className = 'raindrop';
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.height = Math.random() * 20 + 10 + 'px';
                drop.style.animationDuration = Math.random() * 1 + 0.5 + 's';
                drop.style.animationDelay = Math.random() * 3 + 's';
                drop.style.opacity = Math.random() * 0.4 + 0.2;
                container.appendChild(drop);
            }
        }

        const rainToggle = document.getElementById('rainToggle');
        rainToggle.classList.toggle('active', rainEnabled);
        createRain();

        rainToggle.addEventListener('click', () => {
            rainEnabled = !rainEnabled;
            localStorage.setItem('rainEnabled', rainEnabled);
            rainToggle.classList.toggle('active', rainEnabled);
            createRain();
        });

        // Audio
        const audio = document.getElementById('rainAudio');
        const audioToggle = document.getElementById('audioToggle');

        audioToggle.addEventListener('click', () => {
            audioEnabled = !audioEnabled;
            localStorage.setItem('audioEnabled', audioEnabled);
            audioToggle.classList.toggle('active', audioEnabled);

            if (audioEnabled) {
                audio.volume = 0.3;
                audio.play().catch(() => {});
            } else {
                audio.pause();
            }
        });

        if (audioEnabled) {
            audioToggle.classList.add('active');
        }

        // Glow
        const glowToggle = document.getElementById('glowToggle');
        glowToggle.classList.toggle('active', glowEnabled);
        createParticles();

        glowToggle.addEventListener('click', () => {
            glowEnabled = !glowEnabled;
            localStorage.setItem('glowEnabled', glowEnabled);
            glowToggle.classList.toggle('active', glowEnabled);
            createParticles();
        });

        // Click outside modals
        locationModal.addEventListener('click', (e) => {
            if (e.target === locationModal) {
                locationModal.classList.remove('active');
            }
        });

        document.getElementById('tagsModal').addEventListener('click', (e) => {
            if (e.target.id === 'tagsModal') {
                document.getElementById('tagsModal').classList.remove('active');
            }
        });
    </script>
</body>
</html>
