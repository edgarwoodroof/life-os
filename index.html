<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f1a;
            --bg-alt: #16162a;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-hover: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-hover: rgba(255, 255, 255, 0.15);
            --primary: #c9a8ff;
            --primary-glow: rgba(201, 168, 255, 0.4);
            --secondary: #8b7ec8;
            --text: #e8e8f0;
            --text-dim: #6a6a80;
            --rain: rgba(174, 194, 224, 0.25);
            --danger: #ff6b6b;
            --success: #6bcf6b;
            --accent-blue: #5ca8ff;
            --accent-pink: #ff6b9d;
            --accent-orange: #ffb347;
            --blur: 24px;
            --font-main: 'Outfit', sans-serif;
        }

        .light-mode {
            --bg: #f0f2f5;
            --bg-alt: #e8eaed;
            --glass: rgba(0, 0, 0, 0.03);
            --glass-hover: rgba(0, 0, 0, 0.06);
            --glass-border: rgba(0, 0, 0, 0.08);
            --glass-border-hover: rgba(0, 0, 0, 0.15);
            --primary: #7c5cd6;
            --primary-glow: rgba(124, 92, 214, 0.3);
            --secondary: #9b8ac4;
            --text: #1a1a2e;
            --text-dim: #6a6a80;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html { font-size: 16px; }

        body {
            font-family: var(--font-main);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.5s ease, color 0.3s ease;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(120, 80, 200, 0.12), transparent),
                        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(80, 60, 150, 0.08), transparent);
            pointer-events: none;
            z-index: -2;
        }

        .light-mode body::before {
            background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(120, 80, 200, 0.08), transparent),
                        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(80, 60, 150, 0.05), transparent);
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 300px 1fr 320px;
            gap: 20px;
            min-height: calc(100vh - 40px);
        }

        .panel {
            background: var(--glass);
            backdrop-filter: blur(var(--blur));
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .panel.dragging {
            opacity: 0.5;
            transform: scale(0.98);
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            cursor: grab;
        }

        .panel-header:active {
            cursor: grabbing;
        }

        .panel-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-title::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .panel-action {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 6px 10px;
            color: var(--text-dim);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .panel-action:hover {
            background: var(--primary);
            color: var(--bg);
        }

        /* Clock */
        .clock-display {
            font-size: 48px;
            font-weight: 300;
            color: var(--text);
            line-height: 1;
            background: linear-gradient(135deg, var(--text) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .clock-seconds {
            font-size: 20px;
            color: var(--primary);
            opacity: 0.7;
        }

        .clock-date {
            font-size: 14px;
            color: var(--text-dim);
            margin-top: 12px;
        }

        .clock-greeting {
            font-size: 16px;
            color: var(--secondary);
            margin-top: 10px;
        }

        .clock-formats {
            display: flex;
            gap: 6px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .clock-format-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text-dim);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .clock-format-btn:hover, .clock-format-btn.active {
            background: var(--primary);
            color: var(--bg);
        }

        /* Ambient */
        .ambient-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ambient-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .ambient-btn:hover {
            background: var(--glass-hover);
            border-color: var(--glass-border-hover);
        }

        .ambient-btn.active {
            background: linear-gradient(135deg, rgba(201, 168, 255, 0.12) 0%, rgba(255, 107, 157, 0.12) 100%);
            border-color: var(--primary);
        }

        .ambient-icon { font-size: 18px; }

        .ambient-label { flex: 1; }

        .ambient-toggle {
            width: 40px;
            height: 22px;
            background: var(--glass);
            border-radius: 11px;
            position: relative;
            transition: all 0.3s ease;
        }

        .ambient-toggle::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 16px;
            height: 16px;
            background: var(--text-dim);
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .ambient-btn.active .ambient-toggle {
            background: var(--primary);
        }

        .ambient-btn.active .ambient-toggle::after {
            left: 21px;
            background: white;
        }

        /* Planner */
        .planner-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .planner-arrow {
            width: 30px;
            height: 30px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .planner-arrow:hover {
            background: var(--glass-hover);
            color: var(--text);
        }

        .planner-date-label {
            font-size: 13px;
            font-weight: 500;
        }

        .planner-items {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 180px;
        }

        .planner-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
        }

        .planner-item:hover {
            border-color: var(--glass-border-hover);
        }

        .planner-time {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--primary);
            min-width: 50px;
        }

        .planner-text {
            flex: 1;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .planner-x {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .planner-item:hover .planner-x { opacity: 1; }
        .planner-x:hover { color: var(--danger); }

        .planner-add {
            display: flex;
            gap: 6px;
            margin-top: 10px;
        }

        .plan-time-input, .plan-text-input {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 8px 10px;
            color: var(--text);
            font-size: 12px;
            outline: none;
        }

        .plan-time-input {
            width: 80px;
            font-family: 'IBM Plex Mono', monospace;
        }

        .plan-text-input { flex: 1; }

        .plan-time-input:focus, .plan-text-input:focus {
            border-color: var(--primary);
        }

        .plan-add-btn {
            width: 34px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: var(--bg);
            font-size: 14px;
            cursor: pointer;
        }

        /* Tasks */
        .task-input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }

        .task-input {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        .task-input::placeholder { color: var(--text-dim); }
        .task-input:focus { border-color: var(--primary); }

        .task-cat {
            width: 90px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px;
            color: var(--text);
            font-size: 12px;
            outline: none;
        }

        .task-cat option { background: var(--bg); }

        .task-add-btn {
            width: 46px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent-pink) 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .task-add-btn:hover {
            transform: rotate(90deg) scale(1.1);
        }

        .task-filters {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .task-filter-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 8px 14px;
            color: var(--text-dim);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .task-filter-btn:hover { color: var(--text); }

        .task-filter-btn.active {
            background: var(--primary);
            color: var(--bg);
        }

        .task-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 150px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            transition: all 0.3s ease;
        }

        .task-item:hover {
            border-color: var(--glass-border-hover);
        }

        .task-check {
            width: 22px;
            height: 22px;
            border: 2px solid var(--glass-border-hover);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .task-check.checked {
            background: var(--success);
            border-color: var(--success);
        }

        .task-check.checked::after {
            content: '✓';
            color: white;
            font-size: 12px;
        }

        .task-text {
            flex: 1;
            font-size: 14px;
        }

        .task-item.done .task-text {
            text-decoration: line-through;
            color: var(--text-dim);
            opacity: 0.6;
        }

        .task-cat-tag {
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .task-cat-tag.work { background: rgba(92,168,255,0.2); color: var(--accent-blue); }
        .task-cat-tag.personal { background: rgba(255,107,157,0.2); color: var(--accent-pink); }
        .task-cat-tag.urgent { background: rgba(255,107,107,0.2); color: var(--danger); }

        .task-del {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 16px;
            opacity: 0;
        }

        .task-item:hover .task-del { opacity: 1; }
        .task-del:hover { color: var(--danger); }

        .task-foot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid var(--glass-border);
        }

        .task-count { font-size: 12px; color: var(--text-dim); }

        .task-clear {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text-dim);
            font-size: 11px;
            cursor: pointer;
        }

        .task-clear:hover {
            background: var(--danger);
            color: white;
        }

        /* Weather */
        .weather-main {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .weather-icon-wrap {
            width: 80px;
            height: 80px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .weather-icon { font-size: 42px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

        .weather-details { flex: 1; }

        .weather-temp {
            font-size: 38px;
            font-weight: 300;
            line-height: 1;
        }

        .weather-temp-f {
            font-size: 14px;
            color: var(--text-dim);
            margin-left: 4px;
        }

        .weather-con {
            font-size: 14px;
            color: var(--secondary);
            margin-top: 4px;
        }

        .weather-loc {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            padding: 10px 14px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            cursor: pointer;
        }

        .weather-loc:hover { border-color: var(--primary); }

        .loc-text { font-size: 12px; color: var(--text-dim); flex: 1; }
        .loc-change { font-size: 11px; color: var(--primary); }

        .weather-btns {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .weather-btn {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 10px;
            color: var(--text-dim);
            font-size: 11px;
            cursor: pointer;
        }

        .weather-btn:hover {
            background: var(--glass-hover);
            color: var(--text);
        }

        .weather-btn.active {
            background: var(--primary);
            color: var(--bg);
        }

        /* Notes */
        .notes-area {
            flex: 1;
            min-height: 150px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 14px;
            color: var(--text);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        .notes-area::placeholder { color: var(--text-dim); }
        .notes-area:focus { border-color: var(--primary); }

        .notes-status {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* Rain */
        .rain-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .raindrop {
            position: absolute;
            width: 2px;
            background: linear-gradient(to bottom, transparent, var(--rain));
            animation: rain linear infinite;
            opacity: 0;
        }

        @keyframes rain {
            0% { transform: translateY(-100vh); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        /* Modals */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal.active { opacity: 1; visibility: visible; }

        .modal-content {
            background: var(--bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .modal-input {
            width: 100%;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            margin-bottom: 12px;
        }

        .modal-input:focus { border-color: var(--primary); }

        .modal-btns {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 12px;
            color: var(--text-dim);
            font-size: 13px;
            cursor: pointer;
        }

        .modal-btn:hover { background: var(--glass-hover); }

        .modal-btn.primary {
            background: var(--primary);
            color: var(--bg);
        }

        /* Tags */
        .tags-list { max-height: 150px; overflow-y: auto; margin-bottom: 12px; }

        .tag-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            margin-bottom: 6px;
        }

        .tag-name {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .tag-color {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .tag-x {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
        }

        .tag-x:hover { color: var(--danger); }

        .add-tag-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .add-tag-row input[type="color"] {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Settings */
        .settings-option { margin-bottom: 18px; }

        .settings-label {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .theme-box {
            aspect-ratio: 1;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .theme-box:hover { transform: scale(1.1); }
        .theme-box.active { border-color: var(--text); }

        /* Empty */
        .empty-state {
            text-align: center;
            padding: 24px;
        }

        .empty-icon {
            font-size: 40px;
            opacity: 0.4;
            margin-bottom: 8px;
        }

        .empty-text {
            font-size: 13px;
            color: var(--text-dim);
        }

        /* Shortcuts */
        .shortcuts-list {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 16px;
            padding: 12px;
            background: var(--glass);
            border-radius: 10px;
        }

        .shortcut {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .shortcut kbd {
            background: var(--glass);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
        }

        /* Resp */
        @media (max-width: 1100px) {
            .dashboard { grid-template-columns: 1fr; }
            .left-sidebar, .right-sidebar { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        }

        @media (max-width: 600px) {
            .dashboard { gap: 16px; }
            .panel { padding: 16px; border-radius: 16px; }
            .left-sidebar, .right-sidebar { grid-template-columns: 1fr; }
            .clock-display { font-size: 36px; }
        }
    </style>
</head>
<body>
    <div class="rain-container" id="rainContainer"></div>

    <div class="container">
        <div class="dashboard" id="dashboard">
            <!-- Left Column -->
            <div class="left-col">
                <div class="panel" id="clockPanel">
                    <div class="panel-header">
                        <div class="panel-title">Time</div>
                        <button class="panel-action" id="settingsBtn">⚙</button>
                    </div>
                    <div class="clock-display">
                        <span id="clockH">00</span>:<span id="clockM">00</span><span class="clock-seconds" id="clockS">:00</span>
                    </div>
                    <div class="clock-date" id="clockDate"></div>
                    <div class="clock-greeting" id="greeting"></div>
                    <div class="clock-formats">
                        <button class="clock-format-btn" data-f="12">12h</button>
                        <button class="clock-format-btn" data-f="24">24h</button>
                        <button class="clock-format-btn" data-f="jp">JP</button>
                    </div>
                </div>

                <div class="panel" id="ambientPanel">
                    <div class="panel-header">
                        <div class="panel-title">Ambient</div>
                    </div>
                    <div class="ambient-btns">
                        <button class="ambient-btn" id="rainToggle">
                            <span class="ambient-icon">🌧️</span>
                            <span class="ambient-label">Rain</span>
                            <span class="ambient-toggle"></span>
                        </button>
                        <button class="ambient-btn" id="soundToggle">
                            <span class="ambient-icon">🔊</span>
                            <span class="ambient-label">Sound</span>
                            <span class="ambient-toggle"></span>
                        </button>
                        <button class="ambient-btn" id="glowToggle">
                            <span class="ambient-icon">✨</span>
                            <span class="ambient-label">Glow</span>
                            <span class="ambient-toggle"></span>
                        </button>
                        <button class="ambient-btn" id="lightToggle">
                            <span class="ambient-icon">☀️</span>
                            <span class="ambient-label">Light Mode</span>
                            <span class="ambient-toggle"></span>
                        </button>
                    </div>
                </div>

                <div class="panel" id="plannerPanel">
                    <div class="panel-header">
                        <div class="panel-title">Planner</div>
                        <button class="panel-action" id="addTagBtn">+ Tag</button>
                    </div>
                    <div class="planner-nav">
                        <button class="planner-arrow" id="prevDay">←</button>
                        <div class="planner-date-label" id="plannerDate"></div>
                        <button class="planner-arrow" id="nextDay">→</button>
                    </div>
                    <div class="planner-items" id="plannerItems"></div>
                    <div class="planner-add">
                        <input type="time" class="plan-time-input" id="planTime">
                        <input type="text" class="plan-text-input" id="planTask" placeholder="Add plan...">
                        <button class="plan-add-btn" id="planAdd">+</button>
                    </div>
                </div>
            </div>

            <!-- Main -->
            <div class="main-col">
                <div class="panel" id="tasksPanel">
                    <div class="panel-header">
                        <div class="panel-title">Tasks</div>
                    </div>
                    <div class="task-input-row">
                        <input type="text" class="task-input" id="taskInput" placeholder="Add task...">
                        <select class="task-cat" id="taskCat">
                            <option value="">Tag</option>
                        </select>
                        <button class="task-add-btn" id="taskAddBtn">+</button>
                    </div>
                    <div class="task-filters" id="taskFilters">
                        <button class="task-filter-btn active" data-filter="all">All</button>
                    </div>
                    <div class="task-list" id="taskList"></div>
                    <div class="task-foot">
                        <div class="task-count" id="taskCount"></div>
                        <button class="task-clear" id="clearDone">Clear</button>
                    </div>
                </div>
            </div>

            <!-- Right Column -->
            <div class="right-col">
                <div class="panel" id="weatherPanel">
                    <div class="panel-header">
                        <div class="panel-title">Weather</div>
                    </div>
                    <div class="weather-main">
                        <div class="weather-icon-wrap">
                            <div class="weather-icon" id="weatherIcon">🌧️</div>
                        </div>
                        <div class="weather-details">
                            <div class="weather-temp">
                                <span id="tempC">--</span>°C
                                <span class="weather-temp-f" id="tempF">--°F</span>
                            </div>
                            <div class="weather-con" id="weatherCon">Loading...</div>
                        </div>
                    </div>
                    <div class="weather-loc" id="locBtn">
                        <span>📍</span>
                        <span class="loc-text" id="locText">Locating...</span>
                        <span class="loc-change">Change</span>
                    </div>
                    <div class="weather-btns">
                        <button class="weather-btn" id="autoLocBtn">📡 Auto</button>
                        <button class="weather-btn" id="manualBtn">🎨 Manual</button>
                    </div>
                </div>

                <div class="panel" id="notesPanel">
                    <div class="panel-header">
                        <div class="panel-title">Notes</div>
                    </div>
                    <textarea class="notes-area" id="notesArea" placeholder="Write notes..."></textarea>
                    <div class="notes-status">
                        <span class="status-dot"></span>
                        <span id="notesStatus">Saved</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-title">Settings</div>
            <div class="settings-option">
                <div class="settings-label">Theme</div>
                <div class="theme-grid" id="themeGrid"></div>
            </div>
            <div class="modal-btns">
                <button class="modal-btn primary" id="settingsDone">Done</button>
            </div>
        </div>
    </div>

    <div class="modal" id="tagsModal">
        <div class="modal-content">
            <div class="modal-title">Tags</div>
            <div class="tags-list" id="tagsList"></div>
            <div class="add-tag-row">
                <input type="color" id="tagColor" value="#5ca8ff">
                <input type="text" class="modal-input" id="tagName" placeholder="Tag name...">
                <button class="modal-btn primary" id="addTag">Add</button>
            </div>
            <div class="modal-btns">
                <button class="modal-btn" id="tagsDone">Done</button>
            </div>
        </div>
    </div>

    <div class="modal" id="locModal">
        <div class="modal-content">
            <div class="modal-title">Location</div>
            <input type="text" class="modal-input" id="locInput" placeholder="City name...">
            <div class="modal-btns">
                <button class="modal-btn" id="locCancel">Cancel</button>
                <button class="modal-btn primary" id="locSave">Save</button>
            </div>
        </div>
    </div>

    <audio id="rainAudio" loop>
        <source src="https://cdn.pixabay.com/audio/2022/05/13/audio_257112d7b0.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Data
        let data = {
            todos: JSON.parse(localStorage.getItem('todos')) || [],
            notes: localStorage.getItem('notes') || '',
            tags: JSON.parse(localStorage.getItem('tags')) || [
                { name: 'work', color: '#5ca8ff' },
                { name: 'personal', color: '#ff6b9d' },
                { name: 'urgent', color: '#ff6b6b' }
            ],
            planner: JSON.parse(localStorage.getItem('planner')) || {},
            filter: 'all',
            clock: localStorage.getItem('clock') || '12',
            light: localStorage.getItem('lightMode') === 'true',
            rain: localStorage.getItem('rain') === 'true',
            sound: localStorage.getItem('sound') === 'true',
            glow: localStorage.getItem('glow') === 'true',
            theme: localStorage.getItem('theme') || 'rainy',
            font: localStorage.getItem('font') || 'Outfit'
        };

        let currentPlannerDate = new Date().toISOString().split('T')[0];
        let weather = { temp: 15, con: 'rainy', lat: 35.0116, lon: 135.7681, name: 'Kyoto, JP' };

        // Themes
        const themes = [
            { name: 'rainy', bg: '#0f0f1a', primary: '#c9a8ff' },
            { name: 'sunny', bg: '#1a1610', primary: '#ffb347' },
            { name: 'cloudy', bg: '#1a1a24', primary: '#9a9aac' },
            { name: 'night', bg: '#08080f', primary: '#a78bfa' },
            { name: 'ocean', bg: '#0a1628', primary: '#38bdf8' },
            { name: 'forest', bg: '#0a1a0f', primary: '#4ade80' },
            { name: 'rose', bg: '#1a0a14', primary: '#fb7185' },
            { name: 'midnight', bg: '#0a0a1a', primary: '#6366f1' }
        ];

        // Save
        function save() {
            localStorage.setItem('todos', JSON.stringify(data.todos));
            localStorage.setItem('notes', data.notes);
            localStorage.setItem('tags', JSON.stringify(data.tags));
            localStorage.setItem('planner', JSON.stringify(data.planner));
            localStorage.setItem('filter', data.filter);
            localStorage.setItem('clock', data.clock);
            localStorage.setItem('lightMode', data.light);
            localStorage.setItem('rain', data.rain);
            localStorage.setItem('sound', data.sound);
            localStorage.setItem('glow', data.glow);
            localStorage.setItem('theme', data.theme);
            localStorage.setItem('font', data.font);
        }

        // Cross-tab sync
        window.addEventListener('storage', (e) => {
            if (e.key === 'todos') data.todos = JSON.parse(e.newValue);
            else if (e.key === 'notes') data.notes = e.newValue;
            else if (e.key === 'tags') data.tags = JSON.parse(e.newValue);
            else if (e.key === 'planner') data.planner = JSON.parse(e.newValue);
            else if (e.key === 'lightMode') data.light = e.newValue === 'true';
            else if (e.key === 'theme') data.theme = e.newValue;
            else if (e.key === 'font') data.font = e.newValue;
            else if (e.key === 'clock') data.clock = e.newValue;
            else if (e.key === 'rain') data.rain = e.newValue === 'true';
            else if (e.key === 'sound') data.sound = e.newValue === 'true';
            else if (e.key === 'glow') data.glow = e.newValue === 'true';
            
            refreshUI();
        });

        function refreshUI() {
            renderTodos();
            renderFilters();
            renderPlanner();
            applyTheme(data.theme);
            applyLight();
            renderTags();
            updateCat();
        }

        // Clock
        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            
            if (data.clock === '12') h = h % 12 || 12;
            else if (data.clock === 'jp') h = now.getHours();
            
            document.getElementById('clockH').textContent = String(h).padStart(2, '0');
            document.getElementById('clockM').textContent = m;
            document.getElementById('clockS').textContent = ':' + s;
            
            document.getElementById('clockDate').textContent = now.toLocaleDateString('en-US', { 
                weekday: 'long', month: 'long', day: 'numeric' 
            });
            
            let g = 'Night';
            if (now.getHours() >= 5 && now.getHours() < 12) g = 'Morning';
            else if (now.getHours() >= 12 && now.getHours() < 17) g = 'Afternoon';
            else if (now.getHours() >= 17 && now.getHours() < 21) g = 'Evening';
            document.getElementById('greeting').textContent = 'Good ' + g;
        }

        document.querySelectorAll('.clock-format-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.clock-format-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                data.clock = btn.dataset.f;
                save();
                updateClock();
            });
        });

        setInterval(updateClock, 1000);
        updateClock();
        document.querySelector('.clock-format-btn[data-f="' + data.clock + '"]')?.classList.add('active');

        // Weather
        async function fetchWeather() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?lat=${weather.lat}&lon=${weather.lon}&current_weather=true`);
                const d = await res.json();
                weather.temp = d.current_weather.temperature;
                weather.con = d.current_weather.weathercode <= 3 ? 'cloudy' : 
                           d.current_weather.weathercode <= 48 ? 'rainy' : 'rainy';
                document.getElementById('tempC').textContent = Math.round(weather.temp);
                document.getElementById('tempF').textContent = Math.round(weather.temp * 9/5 + 32) + '°F';
                document.getElementById('weatherCon').textContent = weather.con.charAt(0).toUpperCase() + weather.con.slice(1);
                document.getElementById('weatherIcon').textContent = weather.con === 'rainy' ? '🌧️' : '☀️';
                if (!localStorage.getItem('manualTheme')) applyTheme(weather.con === 'rainy' ? 'rainy' : 'cloudy');
            } catch (e) { console.log(e); }
        }

        function getLoc() {
            navigator.geolocation.getCurrentPosition(async (p) => {
                weather.lat = p.coords.latitude;
                weather.lon = p.coords.longitude;
                weather.name = 'Current';
                document.getElementById('locText').textContent = 'Current Location';
                fetchWeather();
            }, () => {
                document.getElementById('locText').textContent = weather.name;
                fetchWeather();
            });
        }

        document.getElementById('autoLocBtn').addEventListener('click', getLoc);
        document.getElementById('locBtn').addEventListener('click', () => {
            document.getElementById('locInput').value = '';
            document.getElementById('locModal').classList.add('active');
        });
        document.getElementById('locCancel').addEventListener('click', () => document.getElementById('locModal').classList.remove('active'));
        document.getElementById('locSave').addEventListener('click', async () => {
            const city = document.getElementById('locInput').value;
            if (city) {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city}`);
                const d = await res.json();
                if (d.length) {
                    weather.lat = parseFloat(d[0].lat);
                    weather.lon = parseFloat(d[0].lon);
                    weather.name = d[0].display_name.split(',')[0];
                }
            }
            document.getElementById('locModal').classList.remove('active');
            document.getElementById('locText').textContent = weather.name;
            fetchWeather();
        });

        getLoc();

        // Planner
        function renderPlanner() {
            const d = new Date(currentPlannerDate);
            document.getElementById('plannerDate').textContent = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            
            const plans = data.planner[currentPlannerDate] || [];
            const list = document.getElementById('plannerItems');
            
            if (!plans.length) {
                list.innerHTML = '<div class="empty-state"><div class="empty-text">No plans</div></div>';
            } else {
                list.innerHTML = plans.sort((a, b) => a.time.localeCompare(b.time)).map((p, i) => `
                    <div class="planner-item">
                        <div class="planner-time">${p.time}</div>
                        <div class="planner-text">${p.task}</div>
                        <button class="planner-x" data-i="${i}">×</button>
                    </div>
                `).join('');
                list.querySelectorAll('.planner-x').forEach(b => {
                    b.addEventListener('click', () => {
                        data.planner[currentPlannerDate].splice(b.dataset.i, 1);
                        save();
                        renderPlanner();
                    });
                });
            }
        }

        document.getElementById('prevDay').addEventListener('click', () => {
            const d = new Date(currentPlannerDate);
            d.setDate(d.getDate() - 1);
            currentPlannerDate = d.toISOString().split('T')[0];
            renderPlanner();
        });
        document.getElementById('nextDay').addEventListener('click', () => {
            const d = new Date(currentPlannerDate);
            d.setDate(d.getDate() + 1);
            currentPlannerDate = d.toISOString().split('T')[0];
            renderPlanner();
        });
        document.getElementById('planAdd').addEventListener('click', () => {
            const time = document.getElementById('planTime').value;
            const task = document.getElementById('planTask').value.trim();
            if (!time || !task) return;
            if (!data.planner[currentPlannerDate]) data.planner[currentPlannerDate] = [];
            data.planner[currentPlannerDate].push({ time, task });
            save();
            document.getElementById('planTime').value = '';
            document.getElementById('planTask').value = '';
            renderPlanner();
        });
        document.getElementById('planTask').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('planAdd').click();
        });

        renderPlanner();

        // Tasks
        function updateCat() {
            document.getElementById('taskCat').innerHTML = '<option value="">Tag</option>' +
                data.tags.map(t => `<option value="${t.name}">${t.name}</option>`).join('');
        }

        function renderFilters() {
            document.getElementById('taskFilters').innerHTML = '<button class="task-filter-btn active" data-filter="all">All</button>' +
                data.tags.map(t => `<button class="task-filter-btn" data-filter="${t.name}">${t.name}</button>`).join('');
            
            document.querySelectorAll('.task-filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.task-filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    data.filter = btn.dataset.filter;
                    save();
                    renderTodos();
                });
            });
            
            document.querySelector(`.task-filter-btn[data-filter="${data.filter}"]`)?.classList.add('active');
        }

        function getTagColor(name) {
            return data.tags.find(t => t.name === name)?.color || '#888';
        }

        function renderTodos() {
            let tasks = data.todos;
            if (data.filter !== 'all') tasks = tasks.filter(t => t.cat === data.filter);
            
            const list = document.getElementById('taskList');
            
            if (!tasks.length) {
                list.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-text">No tasks</div></div>';
            } else {
                list.innerHTML = tasks.map((t, i) => `
                    <div class="task-item ${t.done ? 'done' : ''}">
                        <div class="task-check ${t.done ? 'checked' : ''}" data-i="${i}"></div>
                        <div class="task-text">${t.text}</div>
                        ${t.cat ? `<span class="task-cat-tag" style="background:${getTagColor(t.cat)}20;color:${getTagColor(t.cat)}">${t.cat}</span>` : ''}
                        <button class="task-del" data-i="${i}">×</button>
                    </div>
                `).join('');
                
                list.querySelectorAll('.task-check').forEach(b => {
                    b.addEventListener('click', () => {
                        data.todos.find(t => t.text === b.closest('.task-item').querySelector('.task-text').textContent).done = 
                            !data.todos.find(t => t.text === b.closest('.task-item').querySelector('.task-text').textContent).done;
                        save();
                        renderTodos();
                    });
                });
                
                list.querySelectorAll('.task-del').forEach(b => {
                    b.addEventListener('click', () => {
                        data.todos.splice(b.dataset.i, 1);
                        save();
                        renderTodos();
                    });
                });
            }
            
            const left = data.todos.filter(t => !t.done).length;
            document.getElementById('taskCount').textContent = `${left} of ${data.todos.length} left`;
        }

        document.getElementById('taskAddBtn').addEventListener('click', () => {
            const text = document.getElementById('taskInput').value.trim();
            const cat = document.getElementById('taskCat').value;
            if (!text) return;
            data.todos.push({ text, done: false, cat });
            save();
            document.getElementById('taskInput').value = '';
            document.getElementById('taskCat').value = '';
            renderTodos();
        });
        document.getElementById('taskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('taskAddBtn').click();
        });
        document.getElementById('clearDone').addEventListener('click', () => {
            data.todos = data.todos.filter(t => !t.done);
            save();
            renderTodos();
        });

        renderTodos();
        renderFilters();
        updateCat();

        // Notes
        const notesTimeout = document.getElementById('notesArea').addEventListener('input', () => {
            document.getElementById('notesStatus').textContent = '...';
            clearTimeout(notesTimeout);
            setTimeout(() => {
                data.notes = document.getElementById('notesArea').value;
                save();
                document.getElementById('notesStatus').textContent = 'Saved';
            }, 500);
        });
        document.getElementById('notesArea').value = data.notes;

        // Ambient
        function applyRain() {
            const con = document.getElementById('rainContainer');
            con.innerHTML = '';
            if (!data.rain) return;
            for (let i = 0; i < 120; i++) {
                const d = document.createElement('div');
                d.className = 'raindrop';
                d.style.left = Math.random() * 100 + 'vw';
                d.style.height = Math.random() * 15 + 10 + 'px';
                d.style.animationDuration = Math.random() * 1 + 0.5 + 's';
                d.style.animationDelay = Math.random() * 3 + 's';
                d.style.opacity = Math.random() * 0.4 + 0.2;
                con.appendChild(d);
            }
        }

        document.getElementById('rainToggle').addEventListener('click', () => {
            data.rain = !data.rain;
            document.getElementById('rainToggle').classList.toggle('active', data.rain);
            save();
            applyRain();
        });
        data.rain && document.getElementById('rainToggle').classList.add('active');
        applyRain();

        document.getElementById('soundToggle').addEventListener('click', () => {
            data.sound = !data.sound;
            document.getElementById('soundToggle').classList.toggle('active', data.sound);
            if (data.sound) {
                document.getElementById('rainAudio').volume = 0.3;
                document.getElementById('rainAudio').play().catch(() => {});
            } else {
                document.getElementById('rainAudio').pause();
            }
            save();
        });
        data.sound && document.getElementById('soundToggle').classList.add('active');

        document.getElementById('glowToggle').addEventListener('click', () => {
            data.glow = !data.glow;
            document.getElementById('glowToggle').classList.toggle('active', data.glow);
            document.body.style.background = data.glow ? '' : 'var(--bg)';
            save();
        });
        data.glow && document.getElementById('glowToggle').classList.add('active');

        // Light mode
        function applyLight() {
            document.body.classList.toggle('light-mode', data.light);
            document.getElementById('lightToggle').classList.toggle('active', data.light);
        }

        document.getElementById('lightToggle').addEventListener('click', () => {
            data.light = !data.light;
            applyLight();
            save();
        });
        applyLight();

        // Theme
        function applyTheme(name) {
            const t = themes.find(th => th.name === name) || themes[0];
            document.documentElement.style.setProperty('--bg', t.bg);
            document.documentElement.style.setProperty('--primary', t.primary);
            document.documentElement.style.setProperty('--primary-glow', t.primary + '66');
            data.theme = name;
            save();
            
            document.querySelectorAll('.theme-box').forEach(b => {
                b.classList.toggle('active', b.dataset.theme === name);
            });
        }

        document.getElementById('settingsBtn').addEventListener('click', () => {
            document.getElementById('themeGrid').innerHTML = themes.map(t => `
                <div class="theme-box ${t.name === data.theme ? 'active' : ''}" 
                     style="background:${t.bg};border:3px solid ${t.primary}"
                     data-theme="${t.name}"></div>
            `).join('');
            
            document.querySelectorAll('.theme-box').forEach(b => {
                b.addEventListener('click', () => applyTheme(b.dataset.theme));
            });
            
            document.getElementById('settingsModal').classList.add('active');
        });
        document.getElementById('settingsDone').addEventListener('click', () => {
            document.getElementById('settingsModal').classList.remove('active');
        });
        applyTheme(data.theme);

        // Tags
        function renderTags() {
            document.getElementById('tagsList').innerHTML = data.tags.map((t, i) => `
                <div class="tag-item">
                    <div class="tag-name"><span class="tag-color" style="background:${t.color}"></span>${t.name}</div>
                    <button class="tag-x" data-i="${i}">×</button>
                </div>
            `).join('');
            
            document.querySelectorAll('.tag-x').forEach(b => {
                b.addEventListener('click', () => {
                    data.tags.splice(b.dataset.i, 1);
                    save();
                    renderTags();
                    renderFilters();
                    updateCat();
                });
            });
        }

        document.getElementById('addTagBtn').addEventListener('click', () => {
            renderTags();
            document.getElementById('tagsModal').classList.add('active');
        });
        document.getElementById('addTag').addEventListener('click', () => {
            const name = document.getElementById('tagName').value.trim().toLowerCase();
            if (!name || data.tags.some(t => t.name === name)) return;
            data.tags.push({ name, color: document.getElementById('tagColor').value });
            save();
            document.getElementById('tagName').value = '';
            renderTags();
            renderFilters();
            updateCat();
        });
        document.getElementById('tagName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('addTag').click();
        });
        document.getElementById('tagsDone').addEventListener('click', () => {
            document.getElementById('tagsModal').classList.remove('active');
        });
        renderTags();

        // Drag panels
        const panels = document.querySelectorAll('.panel');
        let draggedPanel = null;

        panels.forEach(p => {
            p.setAttribute('draggable', 'true');
            p.addEventListener('dragstart', (e) => {
                draggedPanel = p;
                p.classList.add('dragging');
            });
            p.addEventListener('dragend', () => {
                p.classList.remove('dragging');
                draggedPanel = null;
            });
            p.addEventListener('dragover', (e) => {
                e.preventDefault();
            });
            p.addEventListener('drop', (e) => {
                e.preventDefault();
                if (draggedPanel && draggedPanel !== p) {
                    const dash = document.getElementById('dashboard');
                    const rect = p.getBoundingClientRect();
                    if (e.clientY < rect.top + rect.height / 2) {
                        dash.insertBefore(draggedPanel, p);
                    } else {
                        dash.insertBefore(draggedPanel, p.nextSibling);
                    }
                }
            });
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            
            if (e.key === 'n') document.getElementById('taskInput').focus();
            if (e.key === 't') document.getElementById('planTask').focus();
            if (e.key === 'r') document.getElementById('rainToggle').click();
            if (e.key === 's') document.getElementById('soundToggle').click();
            if (e.key === 'l') document.getElementById('lightToggle').click();
            if (e.key === ',') document.getElementById('settingsBtn').click();
        });
    </script>
</body>
</html>
